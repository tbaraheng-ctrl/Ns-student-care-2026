                        negScore += Math.abs(s);
                    }
                });
            }

            let remainingScore = maxScore + posScore - negScore;

            const InlineScanner = () => {
                useEffect(() => {
                    const scanner = new Html5Qrcode("check-behavior-qr-reader");
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                    let isProcessingQR = false;
                    
                    scanner.start({ facingMode: "environment" }, config, 
                        (decodedText) => {
                            if (isProcessingQR) return;
                            isProcessingQR = true;
                            const decodedClean = String(decodedText).trim();
                            setSearchId(decodedClean);
                            
                            scanner.stop().then(() => {
                                setShowScannerPopup(false);
                                const found = students.find(s => String(s.code).trim() === decodedClean);
                                if (found) setSelectedStudent(found);
                                else alert('ไม่พบข้อมูลนักเรียนรหัส: ' + decodedClean);
                            }).catch(e => setShowScannerPopup(false));
                        },
                        (err) => {}
                    ).catch(e => {
                        console.error(e);
                        alert('ไม่สามารถเปิดกล้องได้');
                        setShowScannerPopup(false);
                    });

                    return () => {
                        if(scanner.isScanning) scanner.stop().catch(e => console.log(e));
                    };
                }, []);

                return (
                    <div className="fixed inset-0 z-[70] flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm p-4">
                        <div className="w-full max-w-lg relative">
                            <button onClick={() => setShowScannerPopup(false)} className="absolute -top-12 right-0 bg-red-500 text-white w-10 h-10 rounded-full z-10 hover:bg-red-600 shadow-lg text-xl"><i className="fa-solid fa-times"></i></button>
                            <h3 className="text-center font-bold text-ns-yellow text-2xl mb-4">สแกนรหัสประจำตัวนักเรียน</h3>
                            <div id="check-behavior-qr-reader" className="w-full overflow-hidden rounded-2xl border-4 border-ns-blue shadow-2xl bg-black flex items-center justify-center"></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-teal-500">
                        <h2 className="text-xl font-bold text-gray-800 mb-4"><i className="fa-solid fa-user-check text-teal-500 mr-2"></i> ตรวจสอบคะแนนพฤติกรรม</h2>
                        
                        <div className="flex space-x-4 mb-4 border-b pb-2">
                            <label className="flex items-center cursor-pointer">
                                <input type="radio" checked={searchMethod === 'id'} onChange={() => setSearchMethod('id')} className="mr-2 text-ns-blue focus:ring-ns-blue" /> ค้นหาด้วยรหัส/สแกน
                            </label>
                            <label className="flex items-center cursor-pointer">
                                <input type="radio" checked={searchMethod === 'class'} onChange={() => setSearchMethod('class')} className="mr-2 text-ns-blue focus:ring-ns-blue" /> เลือกจากชั้น/ห้อง
                            </label>
                        </div>

                        {searchMethod === 'id' ? (
                            <div className="flex gap-2 max-w-lg">
                                <input type="text" placeholder="พิมพ์เลขประจำตัว..." value={searchId} onChange={e=>setSearchId(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearchById()} className="flex-1 border rounded-lg p-3 focus:ring-2 focus:ring-ns-blue outline-none text-lg" />
                                <button onClick={handleSearchById} className="bg-ns-blue text-white px-6 py-3 rounded-lg hover:bg-blue-800 font-bold shadow"><i className="fa-solid fa-search"></i> ค้นหา</button>
                                <button onClick={() => setShowScannerPopup(true)} className="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-black font-bold shadow flex items-center">
                                    <i className="fa-solid fa-qrcode mr-2 text-xl"></i> สแกน
                                </button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <select value={selectedClass} onChange={e=>{setSelectedClass(e.target.value); setSelectedRoom(''); setSelectedStudent(null);}} className="w-full border rounded-lg p-3">
                                        <option value="">เลือกชั้นเรียน</option>
                                        {uniqueClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <select value={selectedRoom} onChange={e=>{setSelectedRoom(e.target.value); setSelectedStudent(null);}} className="w-full border rounded-lg p-3" disabled={!selectedClass}>
                                        <option value="">เลือกห้อง</option>
                                        {uniqueRooms.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <select onChange={e => {
                                        const id = e.target.value;
                                        setSelectedStudent(students.find(s => String(s.id) === String(id)) || null);
                                    }} className="w-full border rounded-lg p-3 bg-teal-50" disabled={!selectedRoom} value={selectedStudent ? selectedStudent.id : ""}>
                                        <option value="">-- เลือกนักเรียน --</option>
                                        {classStudents.map(s => <option key={s.id} value={s.id}>{s.code} - {s.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        )}
                    </div>

                    {selectedStudent && (
                        <div className="animate-[fadeIn_0.5s_ease-out] space-y-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm flex flex-col md:flex-row items-center md:items-start gap-6">
                                {selectedStudent.photoBase64 ? 
                                    <img src={selectedStudent.photoBase64} alt="student" className="w-24 h-32 rounded-lg object-cover border-4 border-gray-100 shadow-md" /> : 
                                    <i className="fa-solid fa-user-circle text-7xl text-gray-300"></i>
                                }
                                <div className="text-center md:text-left mt-2">
                                    <h3 className="text-2xl font-bold text-ns-blue">{selectedStudent.name}</h3>
                                    <p className="text-gray-600 mt-1">รหัสประจำตัว: <span className="font-bold text-gray-800">{selectedStudent.code}</span></p>
                                    <p className="text-gray-600">ชั้น: <span className="font-bold text-gray-800">{selectedStudent.classLevel}/{selectedStudent.room}</span></p>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg shadow-sm text-center md:text-left">
                                    <p className="text-sm text-blue-600 font-bold mb-1">คะแนนเต็ม</p>
                                    <h4 className="text-3xl font-extrabold text-blue-800">{maxScore}</h4>
                                </div>
                                <div className="bg-green-50 border-l-4 border-green-500 p-4 rounded-lg shadow-sm text-center md:text-left">
                                    <p className="text-sm text-green-600 font-bold mb-1">พฤติกรรมบวก</p>
                                    <h4 className="text-3xl font-extrabold text-green-700">+{posScore}</h4>
                                </div>
                                <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg shadow-sm text-center md:text-left">
                                    <p className="text-sm text-red-600 font-bold mb-1">พฤติกรรมลบ</p>
                                    <h4 className="text-3xl font-extrabold text-red-700">-{negScore}</h4>
                                </div>
                                <div className="bg-yellow-50 border-l-4 border-yellow-500 p-4 rounded-lg shadow-sm text-center md:text-left">
                                    <p className="text-sm text-yellow-700 font-bold mb-1">คะแนนคงเหลือ</p>
                                    <h4 className="text-4xl font-extrabold text-yellow-600">{remainingScore}</h4>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-green-500 text-white p-3 font-bold flex justify-between items-center">
                                        <span><i className="fa-solid fa-plus-circle mr-2"></i> ประวัติพฤติกรรมบวก</span>
                                        <span className="bg-white text-green-600 px-2 py-0.5 rounded-full text-xs">{positiveRecords.length} รายการ</span>
                                    </div>
                                    <div className="p-0 max-h-96 overflow-y-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-gray-50 text-gray-600 sticky top-0">
                                                <tr>
                                                    <th className="p-3 border-b">วันที่</th>
                                                    <th className="p-3 border-b">รายการ</th>
                                                    <th className="p-3 border-b text-center">ผู้บันทึก</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {positiveRecords.length > 0 ? positiveRecords.map(r => (
                                                    <tr key={r.id} className="hover:bg-green-50 transition">
                                                        <td className="p-3 whitespace-nowrap text-gray-500">{formatDisplayDate(r.date)}</td>
                                                        <td className="p-3 font-medium text-green-700">{r.behaviorName} <span className="font-bold">(+{Math.abs(Number(r.score))})</span></td>
                                                        <td className="p-3 text-center text-gray-500 text-xs">{formatRecorderName(r.recorder)}</td>
                                                    </tr>
                                                )) : (
                                                    <tr><td colSpan="3" className="p-6 text-center text-gray-400">ไม่มีประวัติพฤติกรรมบวก</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-red-500 text-white p-3 font-bold flex justify-between items-center">
                                        <span><i className="fa-solid fa-minus-circle mr-2"></i> ประวัติพฤติกรรมลบ</span>
                                        <span className="bg-white text-red-600 px-2 py-0.5 rounded-full text-xs">{negativeRecords.length} รายการ</span>
                                    </div>
                                    <div className="p-0 max-h-96 overflow-y-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-gray-50 text-gray-600 sticky top-0">
                                                <tr>
                                                    <th className="p-3 border-b">วันที่</th>
                                                    <th className="p-3 border-b">รายการ</th>
                                                    <th className="p-3 border-b text-center">ผู้บันทึก</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {negativeRecords.length > 0 ? negativeRecords.map(r => (
                                                    <tr key={r.id} className="hover:bg-red-50 transition">
                                                        <td className="p-3 whitespace-nowrap text-gray-500">{formatDisplayDate(r.date)}</td>
                                                        <td className="p-3 font-medium text-red-700">{r.behaviorName} <span className="font-bold">(-{Math.abs(Number(r.score))})</span></td>
                                                        <td className="p-3 text-center text-gray-500 text-xs">{formatRecorderName(r.recorder)}</td>
                                                    </tr>
                                                )) : (
                                                    <tr><td colSpan="3" className="p-6 text-center text-gray-400">ไม่มีประวัติพฤติกรรมลบ</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    {showScannerPopup && <InlineScanner />}
                </div>
            );
        };

        // 6. หน้าต่างจัดการกิจกรรม (ActivityView)
        const ActivityView = ({ students, activitiesSetting, records, setRecords, user, isSyncing }) => {
            const TARGET_SHEET_ID = '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48';
            
            const [selectedActivityId, setSelectedActivityId] = useState('');
            const [searchMethod, setSearchMethod] = useState('id');
            const [searchId, setSearchId] = useState('');
            const [selectedClass, setSelectedClass] = useState('');
            const [selectedRoom, setSelectedRoom] = useState('');
            
            const [toast, setToast] = useState(null);
            const showToast = (type, title, message) => {
                setToast({ type, title, message });
                setTimeout(() => setToast(null), 3000);
            };
            
            const [editingRecord, setEditingRecord] = useState(null);
            const [deletingRecordId, setDeletingRecordId] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [showScannerPopup, setShowScannerPopup] = useState(false);
            
            const latestRecords = useRef(records);
            useEffect(() => { latestRecords.current = records; }, [records]);

            const lastScannedCode = useRef('');

            const uniqueClasses = [...new Set(students.map(s => s.classLevel).filter(Boolean))].sort();
            const uniqueRooms = [...new Set(students.filter(s => s.classLevel === selectedClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));
            const classStudents = students.filter(s => s.classLevel === selectedClass && s.room === selectedRoom);

            // ฟังก์ชันจัดรูปแบบวันที่ให้เป็น DD/MM/YYYY (พ.ศ.) ป้องกันปี 3112
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                let str = String(dateStr).trim();
                if (str.includes('T') || str.match(/^\d{4}-\d{2}-\d{2}/)) {
                    try {
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) {
                            const day = String(d.getDate()).padStart(2, '0');
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            let year = d.getFullYear();
                            if (year < 2500) year += 543;
                            return `${day}/${month}/${year}`;
                        }
                    } catch(e) {}
                }
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parts[0].padStart(2, '0');
                        const m = parts[1].padStart(2, '0');
                        let y = Number(parts[2]);
                        if (y < 2500 && y > 1900) y += 543;
                        return `${d}/${m}/${y}`;
                    }
                }
                return str;
            };

            const handleAutoSave = async (studentToSave) => {
                if (!selectedActivityId) {
                    showToast('error', 'ข้อผิดพลาด', 'กรุณาเลือกรายการกิจกรรมก่อนสแกน');
                    return;
                }
                if (!studentToSave) return;

                const actData = activitiesSetting.find(a => String(a.id) === String(selectedActivityId));
                if (!actData) return;

                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear() + 543;
                const dateStr = `${day}/${month}/${year}`;
                
                const isDuplicate = latestRecords.current.some(r => r.date === dateStr && String(r.studentId).trim() === String(studentToSave.code).trim() && String(r.activityName).trim() === String(actData.name).trim());
                if (isDuplicate) {
                    showToast('error', 'ข้อมูลซ้ำ', `รหัสประจำตัว ${studentToSave.code} บันทึกกิจกรรมนี้แล้ว`);
                    setSearchId('');
                    return;
                }

                setIsProcessing(true);

                const newRecord = {
                    id: Date.now(),
                    date: dateStr,
                    studentId: studentToSave.code,
                    name: studentToSave.name,
                    room: `${studentToSave.classLevel}/${studentToSave.room}`,
                    activityName: actData.name,
                    statusStr: 'เข้าร่วม',
                    recorder: (user && user.name) || 'Admin'
                };

                try {
                    setRecords(prev => [newRecord, ...prev]);
                    await callGAS('saveActivityRecord', { ...newRecord, targetSheetId: TARGET_SHEET_ID });
                    setSearchId('');
                    showToast('success', 'บันทึกสำเร็จ', `${studentToSave.name} ชั้น ${studentToSave.classLevel}/${studentToSave.room}`);
                } catch (error) {
                    setRecords(prev => prev.filter(r => r.id !== newRecord.id));
                    showToast('error', 'บันทึกล้มเหลว', error.message);
                }
                setIsProcessing(false);
            };

            const handleSearchById = () => {
                if(!searchId) return;
                const found = students.find(s => String(s.code).trim() === String(searchId).trim());
                if (found) {
                    handleAutoSave(found);
                } else {
                    showToast('error', 'ไม่พบข้อมูล', 'รหัสประจำตัวไม่ถูกต้อง');
                    setSearchId('');
                }
            };

            const handleDeleteConfirm = async () => {
                if (!deletingRecordId) return;
                setIsProcessing(true);
                try {
                    await callGAS('deleteActivityRecord', { id: deletingRecordId, targetSheetId: TARGET_SHEET_ID });
                    setRecords(records.filter(r => r.id !== deletingRecordId));
                    setDeletingRecordId(null);
                } catch(error) {
                    console.error('ลบล้มเหลว: ' + error.message);
                }
                setIsProcessing(false);
            };

            const saveEdit = async (e) => {
                e.preventDefault();
                setIsProcessing(true);
                try {
                    await callGAS('editActivityRecord', { ...editingRecord, targetSheetId: TARGET_SHEET_ID });
                    setRecords(records.map(r => r.id === editingRecord.id ? editingRecord : r));
                    setEditingRecord(null);
                } catch(err) {
                    console.error("อัปเดตล้มเหลว: " + err.message);
                }
                setIsProcessing(false);
            };

            const InlineScanner = () => {
                useEffect(() => {
                    const scanner = new Html5Qrcode("activity-qr-reader");
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                    let isProcessingQR = false; 
                    
                    scanner.start({ facingMode: "environment" }, config, 
                        (decodedText) => {
                            if (isProcessingQR) return; 
                            isProcessingQR = true;

                            const decodedClean = String(decodedText).trim();

                            if (lastScannedCode.current === decodedClean) {
                                setTimeout(() => { isProcessingQR = false; }, 500);
                                return;
                            }
                            lastScannedCode.current = decodedClean;
                            setTimeout(() => { lastScannedCode.current = ''; }, 3000);
                            
                            const found = students.find(s => String(s.code).trim() === decodedClean);
                            if (found) {
                                handleAutoSave(found).then(() => {
                                    setTimeout(() => { isProcessingQR = false; }, 1500); 
                                });
                            } else {
                                showToast('error', 'ไม่พบข้อมูล', `ไม่มีรหัสนักเรียน: ${decodedClean}`);
                                setTimeout(() => { isProcessingQR = false; }, 2000);
                            }
                        },
                        (err) => {}
                    ).catch(e => {
                        console.error(e);
                        showToast('error', 'ข้อผิดพลาด', 'ไม่สามารถเปิดกล้องได้');
                        setShowScannerPopup(false);
                    });

                    return () => {
                        if(scanner.isScanning) scanner.stop().catch(e => console.log(e));
                    };
                }, []);

                return (
                    <div className="fixed inset-0 z-[70] flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm p-4">
                        <div className="w-full max-w-lg relative">
                            <button onClick={() => setShowScannerPopup(false)} className="absolute -top-12 right-0 bg-red-500 text-white w-10 h-10 rounded-full z-10 hover:bg-red-600 shadow-lg text-xl"><i className="fa-solid fa-times"></i></button>
                            <h3 className="text-center font-bold text-ns-yellow text-2xl mb-4">สแกนคิวอาร์โค้ดเข้าร่วมกิจกรรม</h3>
                            <div id="activity-qr-reader" className="w-full overflow-hidden rounded-2xl border-4 border-ns-blue shadow-2xl bg-black flex items-center justify-center"></div>
                            <p className="text-center text-white mt-4 opacity-80">ระบบจะบันทึกอัตโนมัติเมื่อสแกนสำเร็จ</p>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-500">
                        <h2 className="text-xl font-bold mb-4 text-gray-800"><i className="fa-solid fa-clipboard-check text-blue-500 mr-2"></i> บันทึกเข้าร่วมกิจกรรม</h2>
                        
                        <div className="mb-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <label className="block text-sm font-bold text-ns-blue mb-2">1. เลือกรายการกิจกรรม</label>
                            <select value={selectedActivityId} onChange={e => setSelectedActivityId(e.target.value)} className="w-full border-2 border-blue-200 rounded-lg p-3 text-lg shadow-sm focus:ring-2 focus:ring-ns-blue outline-none bg-white">
                                <option value="">-- กรุณาเลือกกิจกรรมที่กำลังจัดอยู่ --</option>
                                {activitiesSetting.map(a => <option key={a.id} value={a.id}>{a.name} ({a.date})</option>)}
                            </select>
                        </div>

                        {selectedActivityId && (
                            <div className="animate-[fadeIn_0.5s_ease-out]">
                                <label className="block text-sm font-bold text-gray-700 mb-2">2. ค้นหานักเรียน (ระบบจะบันทึกให้อัตโนมัติเมื่อเลือกหรือสแกนพบ)</label>
                                
                                <div className="flex space-x-4 mb-4 border-b pb-2">
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" checked={searchMethod === 'id'} onChange={() => setSearchMethod('id')} className="mr-2 text-ns-blue focus:ring-ns-blue" /> ป้อนรหัส/สแกน
                                    </label>
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" checked={searchMethod === 'class'} onChange={() => setSearchMethod('class')} className="mr-2 text-ns-blue focus:ring-ns-blue" /> เลือกจากชั้น/ห้อง
                                    </label>
                                </div>

                                {searchMethod === 'id' ? (
                                    <div className="flex gap-2 max-w-lg">
                                        <input type="text" placeholder="พิมพ์เลขประจำตัว..." value={searchId} onChange={e=>setSearchId(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearchById()} className="flex-1 border rounded-lg p-3 focus:ring-2 focus:ring-ns-blue outline-none text-lg" />
                                        <button onClick={handleSearchById} disabled={isProcessing} className="bg-ns-blue text-white px-6 py-3 rounded-lg hover:bg-blue-800 font-bold shadow"><i className="fa-solid fa-search"></i></button>
                                        <button onClick={() => setShowScannerPopup(true)} disabled={isProcessing} className="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-black font-bold shadow flex items-center">
                                            <i className="fa-solid fa-qrcode mr-2 text-xl"></i> สแกน
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <select value={selectedClass} onChange={e=>{setSelectedClass(e.target.value); setSelectedRoom('');}} className="w-full border rounded-lg p-3">
                                                <option value="">เลือกชั้นเรียน</option>
                                                {uniqueClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <select value={selectedRoom} onChange={e=>setSelectedRoom(e.target.value)} className="w-full border rounded-lg p-3" disabled={!selectedClass}>
                                                <option value="">เลือกห้อง</option>
                                                {uniqueRooms.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <select onChange={e => {
                                                const id = e.target.value;
                                                const found = students.find(s => String(s.id) === String(id));
                                                if(found) { handleAutoSave(found); e.target.value = ""; }
                                            }} className="w-full border border-green-500 rounded-lg p-3 bg-green-50" disabled={!selectedRoom}>
                                                <option value="">-- คลิกเลือกชื่อเพื่อบันทึก --</option>
                                                {classStudents.map(s => <option key={s.id} value={s.id}>{s.code} - {s.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm">
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h2 className="text-xl font-bold text-ns-blue"><i className="fa-solid fa-clock-rotate-left mr-2"></i> ประวัติการเข้าร่วมกิจกรรม</h2>
                            {isSyncing && <span className="text-sm text-gray-500 animate-pulse"><i className="fa-solid fa-sync fa-spin mr-1"></i></span>}
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="bg-gray-100 text-gray-700">
                                    <tr>
                                        <th className="p-3 border text-center">วันที่</th>
                                        <th className="p-3 border">รหัสประจำตัว</th>
                                        <th className="p-3 border">ชื่อ-สกุล</th>
                                        <th className="p-3 border text-center">ชั้น/ห้อง</th>
                                        <th className="p-3 border">รายการกิจกรรม</th>
                                        <th className="p-3 border text-center">สถานะ</th>
                                        <th className="p-3 border text-center w-24">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {records.length === 0 ? (
                                        <tr><td colSpan="7" className="text-center p-6 text-gray-400">ยังไม่มีประวัติการเข้าร่วมกิจกรรม</td></tr>
                                    ) : (
                                        records.map(r => (
                                            <tr key={r.id} className="border-b hover:bg-gray-50">
                                                <td className="p-2 border text-center">{formatDisplayDate(r.date)}</td>
                                                <td className="p-2 border font-medium">{r.studentId}</td>
                                                <td className="p-2 border">{r.name}</td>
                                                <td className="p-2 border text-center">{r.room}</td>
                                                <td className="p-2 border">{r.activityName}</td>
                                                <td className="p-2 border text-center">
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${r.statusStr === 'เข้าร่วม' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                        {r.statusStr}
                                                    </span>
                                                </td>
                                                <td className="p-2 border text-center space-x-2">
                                                    <button onClick={() => setEditingRecord({...r, date: formatDisplayDate(r.date)})} className="text-blue-500 hover:text-blue-700 bg-blue-50 p-1.5 rounded"><i className="fa-solid fa-edit"></i></button>
                                                    <button onClick={() => setDeletingRecordId(r.id)} className="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded"><i className="fa-solid fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {editingRecord && (
                        <div className="fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg">
                                <h3 className="text-xl font-bold text-ns-blue mb-4 border-b pb-2"><i className="fa-solid fa-pen-to-square mr-2"></i> แก้ไขประวัติกิจกรรม</h3>
                                <form onSubmit={saveEdit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-600 mb-1">รหัสประจำตัว</label>
                                            <input type="text" value={editingRecord.studentId} className="w-full border rounded p-2 bg-gray-100" readOnly />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-600 mb-1">ชั้น/ห้อง</label>
                                            <input type="text" value={editingRecord.room} className="w-full border rounded p-2 bg-gray-100" readOnly />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-sm text-gray-600 mb-1">ชื่อ-สกุล</label>
                                            <input type="text" value={editingRecord.name} className="w-full border rounded p-2 bg-gray-100" readOnly />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-sm text-gray-600 mb-1">รายการกิจกรรม</label>
                                            <input type="text" value={editingRecord.activityName} onChange={e=>setEditingRecord({...editingRecord, activityName: e.target.value})} className="w-full border rounded p-2 focus:ring focus:ring-ns-blue" required />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-sm text-gray-600 mb-1">สถานะ</label>
                                            <select value={editingRecord.statusStr} onChange={e=>setEditingRecord({...editingRecord, statusStr: e.target.value})} className="w-full border rounded p-2">
                                                <option value="เข้าร่วม">เข้าร่วม</option>
                                                <option value="ไม่เข้าร่วม">ไม่เข้าร่วม</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex justify-end space-x-3 mt-6 pt-4 border-t">
                                        <button type="button" onClick={() => setEditingRecord(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">ยกเลิก</button>
                                        <button type="submit" disabled={isProcessing} className="px-4 py-2 bg-ns-blue text-white rounded hover:bg-blue-800 shadow flex items-center">
                                            {isProcessing ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : null}
                                            {isProcessing ? 'กำลังบันทึก...' : 'ยืนยันการแก้ไข'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {deletingRecordId && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center animate-[bounce_0.3s_ease-in-out]">
                                <i className="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4"></i>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบข้อมูล</h3>
                                <p className="text-sm text-gray-600 mb-6">คุณต้องการลบประวัติการเข้าร่วมกิจกรรมนี้ใช่หรือไม่?</p>
                                <div className="flex justify-center space-x-3">
                                    <button onClick={() => setDeletingRecordId(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">ยกเลิก</button>
                                    <button onClick={handleDeleteConfirm} disabled={isProcessing} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 shadow flex items-center transition">
                                        {isProcessing ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-trash mr-2"></i>}
                                        {isProcessing ? 'กำลังลบ...' : 'ยืนยันการลบ'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showScannerPopup && <InlineScanner />}

                    {toast && (
                        <div className={`fixed top-6 right-6 z-[100] bg-white border-l-8 shadow-2xl rounded-xl p-4 flex items-center min-w-[280px] animate-[bounce_0.3s_ease-in-out] ${toast.type === 'error' ? 'border-red-500' : 'border-green-500'}`}>
                            <i className={`fa-solid ${toast.type === 'error' ? 'fa-circle-xmark text-red-500' : 'fa-circle-check text-green-500'} text-3xl mr-3`}></i>
                            <div>
                                <h4 className="font-bold text-gray-800">{toast.title}</h4>
                                <p className="text-sm text-gray-600">{toast.message}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 7. หน้าประวัติการบันทึกรวม (HistoryView)
        const HistoryView = ({ students, timeRecords, behaviorRecords, activityRecords, isSyncing, schoolConfig, user }) => {
            const [recordType, setRecordType] = useState('time'); 
            const [searchMethod, setSearchMethod] = useState('id'); 
            const [searchId, setSearchId] = useState('');
            const [selectedClass, setSelectedClass] = useState('');
            const [selectedRoom, setSelectedRoom] = useState('');
            const [showScannerPopup, setShowScannerPopup] = useState(false);

            // ตัวแปรสำหรับตัวกรองพฤติกรรม
            const [filterBehavior, setFilterBehavior] = useState(''); 
            const uniqueBehaviors = [...new Set((behaviorRecords || []).map(b => b.behaviorName).filter(Boolean))].sort();

            const uniqueClasses = [...new Set((students || []).map(s => s.classLevel).filter(Boolean))].sort();
            const uniqueRooms = [...new Set((students || []).filter(s => s.classLevel === selectedClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));

            // ฟังก์ชันกรองข้อมูลที่รองรับตัวกรองพฤติกรรม
            const getFilteredRecords = () => {
                let baseRecords = [];
                if (recordType === 'time') baseRecords = timeRecords || [];
                else if (recordType === 'behavior') baseRecords = behaviorRecords || [];
                else if (recordType === 'activity') baseRecords = activityRecords || [];

                return baseRecords.filter(r => {
                    let match = true;
                    if (searchMethod === 'id' && searchId) {
                        match = String(r.studentId).trim() === String(searchId).trim();
                    } else if (searchMethod === 'class' && selectedClass) {
                        const stu = (students || []).find(s => String(s.code).trim() === String(r.studentId).trim());
                        if (stu) {
                            match = stu.classLevel === selectedClass && (selectedRoom ? stu.room === selectedRoom : true);
                        } else {
                            match = false; 
                        }
                    }
                    
                    // เงื่อนไข: กรองตามรายการพฤติกรรม (ถ้าผู้ใช้เลือก)
                    if (match && recordType === 'behavior' && filterBehavior) {
                        match = String(r.behaviorName).trim() === String(filterBehavior).trim();
                    }
                    
                    return match;
                });
            };

            const filteredRecords = getFilteredRecords();

            // ฟังก์ชันจัดรูปแบบวันที่ให้เป็น DD/MM/YYYY (พ.ศ.)
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                let str = String(dateStr).trim();
                if (str.includes('T') || str.match(/^\d{4}-\d{2}-\d{2}/)) {
                    try {
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) {
                            const day = String(d.getDate()).padStart(2, '0');
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            let year = d.getFullYear();
                            if (year < 2500) year += 543;
                            return `${day}/${month}/${year}`;
                        }
                    } catch(e) {}
                }
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parts[0].padStart(2, '0');
                        const m = parts[1].padStart(2, '0');
                        let y = Number(parts[2]);
                        if (y < 2500 && y > 1900) y += 543;
                        return `${d}/${m}/${y}`;
                    }
                }
                return str;
            };

            // ฟังก์ชันจัดรูปแบบเวลาให้เป็น HH:mm
            const formatDisplayTime = (timeStr) => {
                if (!timeStr) return '';
                if (typeof timeStr === 'string' && !timeStr.includes('T')) return timeStr.substring(0, 5);
                try {
                    const d = new Date(timeStr);
                    if (isNaN(d.getTime())) return timeStr;
                    return d.toLocaleTimeString('th-TH', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit' });
                } catch(e) { return timeStr; }
            };

            const getRemainingScore = (studentId, currentRecordId) => {
                const baseScore = (schoolConfig && schoolConfig.maxBehaviorScore) ? Number(schoolConfig.maxBehaviorScore) : 100;
                const studentRecords = (behaviorRecords || []).filter(r => String(r.studentId).trim() === String(studentId).trim() && r.id <= currentRecordId);
                const totalDeduction = studentRecords.reduce((sum, r) => sum + Number(r.score), 0);
                return baseScore + totalDeduction;
            };

            const InlineScanner = () => {
                useEffect(() => {
                    const scanner = new Html5Qrcode("history-qr-reader");
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                    let isProcessingQR = false;
                    
                    scanner.start({ facingMode: "environment" }, config, 
                        (decodedText) => {
                            if (isProcessingQR) return;
                            isProcessingQR = true;
                            const decodedClean = String(decodedText).trim();
                            setSearchId(decodedClean);
                            
                            scanner.stop().then(() => {
                                setShowScannerPopup(false);
                            }).catch(e => setShowScannerPopup(false));
                        },
                        (err) => {}
                    ).catch(e => {
                        console.error(e);
                        alert('ไม่สามารถเปิดกล้องได้');
                        setShowScannerPopup(false);
                    });

                    return () => {
                        if(scanner.isScanning) scanner.stop().catch(e => console.log(e));
                    };
                }, []);

                return (
                    <div className="fixed inset-0 z-[70] flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm p-4 no-print">
                        <div className="w-full max-w-lg relative">
                            <button onClick={() => setShowScannerPopup(false)} className="absolute -top-12 right-0 bg-red-500 text-white w-10 h-10 rounded-full z-10 hover:bg-red-600 shadow-lg text-xl"><i className="fa-solid fa-times"></i></button>
                            <h3 className="text-center font-bold text-ns-yellow text-2xl mb-4">สแกนรหัสประจำตัวนักเรียน</h3>
                            <div id="history-qr-reader" className="w-full overflow-hidden rounded-2xl border-4 border-ns-blue shadow-2xl bg-black flex items-center justify-center"></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-6">
                    <style>
                        {`
                            @media print {
                                body * { visibility: hidden; background: white; }
                                .print-section, .print-section * { visibility: visible; }
                                .print-section { position: absolute; left: 0; top: 0; width: 100%; padding: 10px; background: white; }
                                .no-print { display: none !important; }
                                .print-only { display: block !important; }
                                table { border-collapse: collapse; width: 100%; margin-top: 15px; }
                                th, td { border: 1px solid #000 !important; color: #000 !important; padding: 8px; }
                                th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                                
                                /* จัดระเบียบหัวรายงานตอนพิมพ์ */
                                .print-header-wrapper { display: flex !important; align-items: center !important; justify-content: flex-start !important; border-bottom: 2px solid #000 !important; padding-bottom: 15px !important; margin-bottom: 15px !important; text-align: left !important; }
                                .print-logo-img { width: 85px !important; height: 85px !important; object-fit: contain !important; margin-right: 25px !important; margin-bottom: 0 !important; }
                                .print-header-text { display: flex !important; flex-direction: column !important; align-items: flex-start !important; text-align: left !important; }
                                .print-header-text h1 { font-size: 22pt !important; margin: 0 0 5px 0 !important; color: #000 !important; }
                                .print-header-text h2 { font-size: 18pt !important; margin: 0 !important; color: #000 !important; }
                            }
                            .print-only { display: none; }
                        `}
                    </style>

                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-gray-600 no-print">
                        <h2 className="text-xl font-bold text-gray-800 mb-4"><i className="fa-solid fa-filter text-gray-600 mr-2"></i> ตัวกรองข้อมูลประวัติ</h2>
                        
                        <div className="mb-4 flex flex-col md:flex-row gap-4">
                            <div className="w-full md:w-1/2">
                                <label className="block text-sm font-bold text-gray-700 mb-2">เลือกรายการที่ต้องการตรวจสอบ:</label>
                                <select value={recordType} onChange={e => { setRecordType(e.target.value); setFilterBehavior(''); }} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-ns-blue outline-none bg-gray-50">
                                    <option value="time">เวลาเข้า-ออกโรงเรียน</option>
                                    <option value="behavior">คะแนนพฤติกรรมนักเรียน</option>
                                    <option value="activity">การเข้าร่วมกิจกรรม</option>
                                </select>
                            </div>
                            
                            {/* แสดงตัวกรองพฤติกรรมเฉพาะเมื่อเลือกดูคะแนนพฤติกรรม */}
                            {recordType === 'behavior' && (
                                <div className="w-full md:w-1/2 animate-[fadeIn_0.3s_ease-out]">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">กรองตามรายการพฤติกรรม:</label>
                                    <select value={filterBehavior} onChange={e => setFilterBehavior(e.target.value)} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-ns-blue outline-none bg-white">
                                        <option value="">-- ดูทุกรายการพฤติกรรม --</option>
                                        {uniqueBehaviors.map((b, i) => <option key={i} value={b}>{b}</option>)}
                                    </select>
                                </div>
                            )}
                        </div>

                        <div className="flex space-x-4 mb-4 border-b pb-2">
                            <label className="flex items-center cursor-pointer">
                                <input type="radio" checked={searchMethod === 'id'} onChange={() => setSearchMethod('id')} className="mr-2 text-ns-blue focus:ring-ns-blue" /> ค้นหาด้วยรหัส/สแกน
                            </label>
                            <label className="flex items-center cursor-pointer">
                                <input type="radio" checked={searchMethod === 'class'} onChange={() => setSearchMethod('class')} className="mr-2 text-ns-blue focus:ring-ns-blue" /> เลือกจากชั้น/ห้อง
                            </label>
                        </div>

                        {searchMethod === 'id' ? (
                            <div className="flex gap-2 max-w-lg">
                                <input type="text" placeholder="พิมพ์เลขประจำตัว..." value={searchId} onChange={e=>setSearchId(e.target.value)} className="flex-1 border rounded-lg p-3 focus:ring-2 focus:ring-ns-blue outline-none text-lg" />
                                <button onClick={() => setShowScannerPopup(true)} className="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-black font-bold shadow flex items-center">
                                    <i className="fa-solid fa-qrcode mr-2 text-xl"></i> สแกน
                                </button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-lg">
                                <select value={selectedClass} onChange={e=>{setSelectedClass(e.target.value); setSelectedRoom('');}} className="w-full border rounded-lg p-3">
                                    <option value="">เลือกชั้นเรียน</option>
                                    {uniqueClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select value={selectedRoom} onChange={e=>setSelectedRoom(e.target.value)} className="w-full border rounded-lg p-3" disabled={!selectedClass}>
                                    <option value="">เลือกห้อง (ทั้งหมด)</option>
                                    {uniqueRooms.map(r => <option key={r} value={r}>{r}</option>)}
                                </select>
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm print-section">
                        <div className="print-only mb-6">
                            <div className="flex items-center border-b-2 border-gray-800 pb-4 print-header-wrapper">
                                {schoolConfig && schoolConfig.logo && <img src={schoolConfig.logo} alt="Logo" className="w-20 h-20 object-contain mr-6 print-logo-img" />}
                                <div className="text-left print-header-text">
                                    <h1 className="text-2xl font-bold text-gray-900 mb-1">{schoolConfig ? schoolConfig.name : 'โรงเรียนนราสิกขาลัย'}</h1>
                                    <h2 className="text-lg font-bold text-gray-700">
                                        รายงานประวัติ{recordType === 'time' ? 'การเข้า-ออกโรงเรียน' : recordType === 'behavior' ? 'คะแนนพฤติกรรมนักเรียน' : 'การเข้าร่วมกิจกรรม'}
                                    </h2>
                                </div>
                            </div>
                            <div className="flex justify-between mt-3 text-sm text-gray-800 font-bold">
                                <p>ข้อมูล ณ วันที่: {new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                <p>ผู้รายงาน: {user ? user.name : 'ผู้ดูแลระบบ'}</p>
                            </div>
                        </div>

                        <div className="flex justify-between items-center mb-4 border-b pb-2 no-print">
                            <h2 className="text-xl font-bold text-ns-blue flex items-center">
                                <i className="fa-solid fa-file-lines mr-2"></i> 
                                ประวัติ: {recordType === 'time' ? 'การเข้า-ออกโรงเรียน' : recordType === 'behavior' ? 'คะแนนพฤติกรรมนักเรียน' : 'การเข้าร่วมกิจกรรม'}
                                {isSyncing && <span className="text-sm text-gray-500 animate-pulse ml-4"><i className="fa-solid fa-sync fa-spin mr-1"></i></span>}
                            </h2>
                            <button onClick={() => window.print()} className="bg-gray-800 text-white px-6 py-2 rounded-lg shadow hover:bg-black transition flex items-center font-bold">
                                <i className="fa-solid fa-print mr-2"></i> พิมพ์รายงาน / PDF
                            </button>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="bg-gray-100 text-gray-700">
                                    <tr>
                                        <th className="p-3 border text-center">วันที่</th>
                                        <th className="p-3 border">รหัสประจำตัว</th>
                                        <th className="p-3 border">ชื่อ-สกุล</th>
                                        <th className="p-3 border text-center">ชั้น/ห้อง</th>
                                        
                                        {recordType === 'time' && <th className="p-3 border text-center">เวลา</th>}
                                        {recordType === 'time' && <th className="p-3 border text-center">ประเภท</th>}
                                        {recordType === 'time' && <th className="p-3 border text-center">สถานะ</th>}

                                        {recordType === 'behavior' && <th className="p-3 border">รายการพฤติกรรม</th>}
                                        {recordType === 'behavior' && <th className="p-3 border text-center">ประเภท</th>}
                                        {recordType === 'behavior' && <th className="p-3 border text-center">คะแนน</th>}
                                        {recordType === 'behavior' && <th className="p-3 border text-center">คะแนนคงเหลือ</th>}

                                        {recordType === 'activity' && <th className="p-3 border">รายการกิจกรรม</th>}
                                        {recordType === 'activity' && <th className="p-3 border text-center">สถานะ</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredRecords.length === 0 ? (
                                        <tr><td colSpan="8" className="text-center p-6 text-gray-400">ไม่พบประวัติการบันทึกตามเงื่อนไขที่ค้นหา</td></tr>
                                    ) : (
                                        filteredRecords.map(r => (
                                            <tr key={r.id} className="border-b hover:bg-gray-50">
                                                <td className="p-2 border text-center">{formatDisplayDate(r.date)}</td>
                                                <td className="p-2 border font-medium">{r.studentId}</td>
                                                <td className="p-2 border">{r.name}</td>
                                                <td className="p-2 border text-center">{r.room}</td>
                                                
                                                {recordType === 'time' && <td className="p-2 border text-center font-bold text-ns-blue">{formatDisplayTime(r.time)} น.</td>}
                                                {recordType === 'time' && <td className="p-2 border text-center">{r.type}</td>}
                                                {recordType === 'time' && (
                                                    <td className="p-2 border text-center">
                                                        <span className={`px-2 py-1 rounded text-xs text-white ${r.statusStr === 'สาย' ? 'bg-red-500' : 'bg-green-500'}`}>{r.statusStr}</span>
                                                    </td>
                                                )}

                                                {recordType === 'behavior' && <td className="p-2 border">{r.behaviorName}</td>}
                                                {recordType === 'behavior' && (
                                                    <td className="p-2 border text-center">
                                                        <span className={`px-2 py-1 rounded text-xs text-white ${r.type === 'บวก' ? 'bg-green-500' : 'bg-red-500'}`}>{r.type}</span>
                                                    </td>
                                                )}
                                                {recordType === 'behavior' && (
                                                    <td className={`p-2 border text-center font-bold ${r.type === 'บวก' || Number(r.score) > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                        {r.type === 'บวก' && Number(r.score) > 0 ? '+' : ''}{r.score}
                                                    </td>
                                                )}
                                                {recordType === 'behavior' && (
                                                    <td className="p-2 border text-center font-bold text-ns-blue">
                                                        {getRemainingScore(r.studentId, r.id)}
                                                    </td>
                                                )}

                                                {recordType === 'activity' && <td className="p-2 border">{r.activityName}</td>}
                                                {recordType === 'activity' && (
                                                    <td className="p-2 border text-center">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${r.statusStr === 'เข้าร่วม' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                            {r.statusStr}
                                                        </span>
                                                    </td>
                                                )}
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    {showScannerPopup && <InlineScanner />}
                </div>
            );
        };

        // 8. หน้าจัดการข้อมูลนักเรียน (StudentManager) - ดึงข้อมูลและบันทึกลง Sheet จริง
        const StudentManager = ({ students, setStudents, provincesData, isSyncing, onRefresh }) => {
            
            const [formData, setFormData] = useState({
                id: '', photoBase64: '', code: '', name: '', classLevel: '', room: '', program: '',
                dob: '', age: '', advisor: '', addrNo: '', addrMoo: '', addrProv: '', addrDist: '',
                addrSub: '', addrZip: '', address: '', parentName: '', parentTel: ''
            });
            
            const [searchTerm, setSearchTerm] = useState('');
            const [filterClass, setFilterClass] = useState('');
            const [filterRoom, setFilterRoom] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const clearForm = () => {
                setFormData({
                    id: '', photoBase64: '', code: '', name: '', classLevel: '', room: '', program: '',
                    dob: '', age: '', advisor: '', addrNo: '', addrMoo: '', addrProv: '', addrDist: '',
                    addrSub: '', addrZip: '', address: '', parentName: '', parentTel: ''
                });
            };

            const calculateAge = (dob) => {
                if(!dob) return '';
                const diff_ms = Date.now() - new Date(dob).getTime();
                const age_dt = new Date(diff_ms); 
                return Math.abs(age_dt.getUTCFullYear() - 1970);
            };

            const buildAddress = (data) => {
                let parts = [];
                if (data.addrNo) parts.push(`บ้านเลขที่ ${data.addrNo}`);
                if (data.addrMoo) parts.push(`หมู่ที่ ${data.addrMoo}`);
                if (data.addrSub) parts.push(`ต.${data.addrSub}`);
                if (data.addrDist) parts.push(`อ.${data.addrDist}`);
                if (data.addrProv) parts.push(`จ.${data.addrProv}`);
                if (data.addrZip) parts.push(`${data.addrZip}`);
                return parts.join(' ');
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                let newForm = { ...formData, [name]: value };

                if (name === 'dob') {
                    newForm.age = calculateAge(value);
                }
                
                if (['classLevel', 'room'].includes(name)) {
                    if(newForm.classLevel && newForm.room) {
                        newForm.program = newForm.classLevel.startsWith('ม.4') || newForm.classLevel.startsWith('ม.5') || newForm.classLevel.startsWith('ม.6') ? 'วิทย์-คณิต' : 'ทั่วไป';
                    }
                }

                if (name === 'addrProv') { newForm.addrDist = ''; newForm.addrSub = ''; newForm.addrZip = ''; }
                if (name === 'addrDist') { newForm.addrSub = ''; newForm.addrZip = ''; }
                
                if (name === 'addrSub' && newForm.addrProv && newForm.addrDist) {
                    const match = provincesData.find(p => 
                        (p.prov || '').trim() === newForm.addrProv && 
                        (p.dist || '').trim() === newForm.addrDist && 
                        (p.sub || '').trim() === value
                    );
                    if(match) newForm.addrZip = (match.zip || '').trim();
                }

                if (['addrNo', 'addrMoo', 'addrProv', 'addrDist', 'addrSub', 'addrZip'].includes(name)) {
                    newForm.address = buildAddress(newForm);
                }

                setFormData(newForm);
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();

                            const MAX_WIDTH = 200;
                            const MAX_HEIGHT = 250;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            setFormData({ ...formData, photoBase64: canvas.toDataURL('image/jpeg', 0.7) });
                        };
                        img.src = event.target.result;

        // 12. หน้าแจ้งนักเรียนลา (LeaveView) - [เพิ่มใหม่]
        const LeaveView = ({ students, teachers, user, records, setRecords, isSyncing }) => {
            const TARGET_SHEET_ID = '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48';
            const [isProcessing, setIsProcessing] = useState(false);

            // ฟังก์ชันตัดคำนำหน้าและช่องว่าง เพื่อให้เทียบชื่อครูได้แม่นยำ
            const normalizeName = (name) => {
                if (!name) return '';
                let clean = String(name).replace(/[\s\u200B-\u200D\uFEFF\.\-\_]/g, ''); 
                const prefixes = ['ผู้อำนวยการ', 'ผอ', 'รองผู้อำนวยการ', 'รอง', 'ผู้ช่วยศาสตราจารย์', 'ผศ', 'นาย', 'นางสาว', 'นส', 'นาง', 'ดช', 'ดญ', 'ว่าที่รต', 'ว่าที่ร้อยตรี', 'ครู', 'อาจารย์', 'อ'];
                let hasPrefix = true;
                while(hasPrefix) {
                    hasPrefix = false;
                    for (let prefix of prefixes) {
                        if (clean.startsWith(prefix)) {
                            clean = clean.substring(prefix.length);
                            hasPrefix = true; break;
                        }
                    }
                }
                return clean;
            };

            // หานักเรียนที่เป็นที่ปรึกษา
            const userCleanName = normalizeName(user ? user.name : '');
            const myTeacher = teachers.find(t => {
                const teacherCleanName = normalizeName(t.name);
                return teacherCleanName === userCleanName || 
                       (teacherCleanName && userCleanName && (teacherCleanName.includes(userCleanName) || userCleanName.includes(teacherCleanName)));
            });

            // เพิ่ม State สำหรับจัดการ Dropdown
            const [selectedClass, setSelectedClass] = useState('');
            const [selectedRoom, setSelectedRoom] = useState('');

            // เซ็ตค่าเริ่มต้นให้เป็นห้องของครูที่ปรึกษา (ถ้าหาเจอ)
            useEffect(() => {
                if (myTeacher && myTeacher.classLevel && myTeacher.room) {
                    setSelectedClass(myTeacher.classLevel);
                    setSelectedRoom(myTeacher.room);
                }
            }, [myTeacher]);

            const uniqueClasses = [...new Set((students || []).map(s => s.classLevel).filter(Boolean))].sort();
            const uniqueRooms = [...new Set((students || []).filter(s => s.classLevel === selectedClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));

            // กรองนักเรียนตามห้องที่เลือก
            const targetStudents = (selectedClass && selectedRoom) 
                ? (students || []).filter(s => String(s.classLevel).trim() === String(selectedClass).trim() && String(s.room).trim() === String(selectedRoom).trim()).sort((a,b) => Number(a.code) - Number(b.code))
                : [];

            const getTodayYMD = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            };

            // ฟังก์ชันจัดรูปแบบวันที่ให้เป็น DD/MM/YYYY (พ.ศ.) ป้องกันปี 3112 และ ISO string
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                let str = String(dateStr).trim();
                if (str.includes('T') || str.match(/^\d{4}-\d{2}-\d{2}/)) {
                    try {
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) {
                            const day = String(d.getDate()).padStart(2, '0');
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            let year = d.getFullYear();
                            if (year < 2500) year += 543;
                            return `${day}/${month}/${year}`;
                        }
                    } catch(e) {}
                }
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parts[0].padStart(2, '0');
                        const m = parts[1].padStart(2, '0');
                        let y = Number(parts[2]);
                        if (y < 2500 && y > 1900) y += 543;
                        return `${d}/${m}/${y}`;
                    }
                }
                return str;
            };
            
            const [inputDate, setInputDate] = useState(getTodayYMD());
            const [leaveDays, setLeaveDays] = useState(1); // เพิ่ม State สำหรับจำนวนวันลา
            const [selectedStudentIds, setSelectedStudentIds] = useState([]);
            const [leaveType, setLeaveType] = useState('ลาป่วย');
            const [cart, setCart] = useState([]);

            const [editingRecord, setEditingRecord] = useState(null);
            const [deletingRecordId, setDeletingRecordId] = useState(null);

            // --- เพิ่ม State สำหรับกรองประวัติการลา ---
            const [historyDateFilter, setHistoryDateFilter] = useState('today');
            const [historyCustomDate, setHistoryCustomDate] = useState(getTodayYMD());

            const getBEStrSafeLocal = (d) => {
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                let year = d.getFullYear();
                if (year < 2500) year += 543;
                return `${day}/${month}/${year}`;
            };

            const formatDateForDB = (ymdStr) => {
                if(!ymdStr) return '';
                const parts = ymdStr.split('-');
                if(parts.length !== 3) return ymdStr;
                return `${parts[2]}/${parts[1]}/${Number(parts[0])+543}`;
            };

            const handleCheckboxChange = (code) => {
                setSelectedStudentIds(prev => prev.includes(code) ? prev.filter(id => id !== code) : [...prev, code]);
            };

            const addToCart = () => {
                if (selectedStudentIds.length === 0) return alert('กรุณาเลือกนักเรียนอย่างน้อย 1 คน');
                if (!inputDate) return alert('กรุณาเลือกวันที่');
                if (!selectedClass || !selectedRoom) return alert('กรุณาเลือกชั้นและห้องเรียน');
                if (leaveDays < 1) return alert('จำนวนวันลาต้องอย่างน้อย 1 วัน');

                let newCartItems = [];
                const baseDate = new Date(inputDate);

                // วนลูปสร้างรายการตามจำนวนวันลาที่ระบุ
                for (let i = 0; i < leaveDays; i++) {
                    const currentLeaveDate = new Date(baseDate);
                    currentLeaveDate.setDate(currentLeaveDate.getDate() + i);

                    const yyyy = currentLeaveDate.getFullYear();
                    const mm = String(currentLeaveDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(currentLeaveDate.getDate()).padStart(2, '0');
                    const ymdStr = `${yyyy}-${mm}-${dd}`;

                    const formattedDate = formatDateForDB(ymdStr);
                    
                    const dailyItems = selectedStudentIds.map(code => {
                        const stu = targetStudents.find(s => s.code === code);
                        return {
                            tempId: Date.now() + Math.random() + i, // ทำให้ ID ไม่ซ้ำ
                            date: formattedDate,
                            studentId: stu.code,
                            name: stu.name,
                            room: `${stu.classLevel}/${stu.room}`,
                            leaveType: leaveType,
                            recorder: (user && user.name) ? user.name : 'Admin'
                        };
                    });
