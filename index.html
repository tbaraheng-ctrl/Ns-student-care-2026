<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Student Care (NSC) - โรงเรียนนราสิกขาลัย</title>
    
    <!-- Fonts: Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        ns: {
                            blue: '#003366',
                            yellow: '#FFCC00',
                            light: '#F3F4F6',
                            white: '#FFFFFF'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- FontAwesome -->

    <style>
        body { background-color: #F3F4F6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
    
    <script>
        // ซ่อนข้อความแจ้งเตือน [BABEL] Note (ไฟล์เกิน 500KB) เพื่อให้ Console สะอาดและไม่กวนใจ
        const originalConsoleError = console.error;
        console.error = function(...args) {
            if (typeof args[0] === 'string' && args[0].includes('deoptimised the styling')) return;
            originalConsoleError.apply(console, args);
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-compact="false">
        const { useState, useEffect, useRef } = React;

        // --- ตั้งค่าระบบ (Configurations) ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzys4pTboqlekdZCWizoMQCPuHxpBuS05nRhw1S94VQbovSacq_4Z67Ryr8ogUEq2gf/exec";
        
        // --- ระบบสื่อสารกับ Google App Script (เปลี่ยนเป็น POST แบบฟอร์มมาตรฐาน) ---
        const callGAS = async (action, payload) => {
            const formBody = new URLSearchParams();
            formBody.append('action', action);
            if (payload) {
                // 👇 แนบสถานะสวิตช์ Line Notify ปัจจุบัน ส่งตรงไปบังคับหลังบ้านทุกครั้ง 👇
                try {
                    const savedLineSettings = localStorage.getItem('ns_line_notify');
                    if (savedLineSettings) {
                        payload.clientLineSettings = JSON.parse(savedLineSettings);
                    }
                } catch(e) {}
                // 👆 ------------------------------------------------------- 👆
                
                formBody.append('payload', JSON.stringify(payload));
            }

            // ฟังก์ชันแปลงคำนำหน้าชื่อ ผู้อำนวยการ -> ผอ. และ รองผู้อำนวยการ -> รอง แบบอัตโนมัติ (ดักจับเข้มงวดขึ้น)
            const formatDataNames = (obj) => {
                if (typeof obj === 'string') {
                    return obj.replace(/ผู้อำนวยการโรงเรียน/g, 'ผอ.').replace(/ผู้อำนวยการ/g, 'ผอ.').replace(/รองผู้อำนวยการ/g, 'รอง');
                } else if (Array.isArray(obj)) {
                    return obj.map(formatDataNames);
                } else if (obj !== null && typeof obj === 'object') {
                    const newObj = {};
                    
                    for (let key in obj) {
                        newObj[key] = formatDataNames(obj[key]);
                    }
                    
                    // บังคับเปลี่ยนคำนำหน้าชื่อ หากมีคีย์ name
                    if (newObj.name) {
                        let originalName = String(newObj.name).trim();
                        let cleanName = originalName.replace(/^(นาย|นางสาว|นาง|ด\.ช\.|ด\.ญ\.|ว่าที่\s*ร\.ต\.|ว่าที่ร้อยตรี|ครู|ผู้อำนวยการโรงเรียน|ผู้อำนวยการ|รองผู้อำนวยการ|ผอ\.|รอง)\s*/g, '').trim();
                        
                        // เช็คจาก Role หรือข้อมูลใน String
                        const isExecutive = newObj.role === 'executive' || originalName.includes('ผอ.') || originalName.includes('ผู้อำนวยการ');
                        const isDeputy = originalName.includes('รอง');
                        
                        if (isExecutive) {
                            if (isDeputy) {
                                newObj.name = `รอง${cleanName}`;
                            } else {
                                newObj.name = `ผอ.${cleanName}`;
                            }
                        } else if (newObj.role === 'user' || newObj.role === 'admin' || newObj.role === 'dept_admin') {
                            newObj.name = `ครู${cleanName}`;
                        } else if (originalName.includes('ครู')) {
                            newObj.name = `ครู${cleanName}`;
                        }
                    }
                    return newObj;
                }
                return obj;
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: formBody,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });
                
                const rawData = await response.json();
                const data = formatDataNames(rawData); // นำข้อมูลมาแปลงคำนำหน้าชื่อก่อนส่งไปใช้งาน

                if (data.status === 'success') {
                    return data;
                } else {
                    throw new Error(data.message || 'เกิดข้อผิดพลาดจากระบบหลังบ้าน');
                }
            } catch (error) {
                console.error("GAS Request Error:", error);
                // จัดการข้อผิดพลาด Failed to fetch ให้แจ้งเตือนสาเหตุที่ชัดเจน
                if (error.message.includes('Failed to fetch') || error.name === 'TypeError') {
                    throw new Error(
                        'ไม่สามารถเชื่อมต่อฐานข้อมูลได้ (Failed to fetch)\n\n' +
                        'วิธีแก้ไข:\n' +
                        '1. ตรวจสอบว่า GAS_URL ในโค้ดตรงกับ URL ล่าสุดหรือไม่\n' +
                        '2. ตอน Deploy ให้เลือก รันในฐานะ: "ฉัน (Me)"\n' +
                        '3. ตอน Deploy ผู้มีสิทธิ์เข้าถึง ต้องเป็น: "ทุกคน (Anyone)"'
                    );
                }
                throw new Error('เชื่อมต่อล้มเหลว: ' + error.message);
            }
        };

        // --- ฟังก์ชันคำนวณระยะทาง GPS (Haversine Formula) ---
        const getDistanceFromLatLonInM = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; // รัศมีโลก เมตร
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; // คืนค่าเป็นเมตร
        };

        // --- Helper Function สำหรับคำนวณเวลาเข้า-ออกกรณีข้ามวัน ---
        const determineModeAndLate = (currentStr, inStr, lateStr, outStr) => {
            if (!inStr || !lateStr || !outStr) return { isOutMode: false, isLate: false };

            const getMinutes = (ts) => {
                const [h, m] = ts.split(':').map(Number);
                return h * 60 + m;
            };

            let c = getMinutes(currentStr);
            let i = getMinutes(inStr);
            let l = getMinutes(lateStr);
            let o = getMinutes(outStr);

            // ปรับเวลาให้เป็นกรอบ 24 ชั่วโมง โดยเริ่มจากเวลาเข้า
            if (o <= i) o += 1440;
            if (l <= i) l += 1440; 
            
            let effectiveCurrent = c;
            // ถ้าระบบตั้งให้ออกข้ามวัน และเวลาปัจจุบันเลยเที่ยงคืนแต่น้อยกว่าเวลาเข้า
            if (o > 1440 && c < i) {
                effectiveCurrent += 1440;
            } else if (c < i && (i - c) > 720) {
               effectiveCurrent += 1440;
            }

            const isOutMode = effectiveCurrent >= o;
            const isLate = !isOutMode && effectiveCurrent > l;

            return { isOutMode, isLate };
        };

        // --- Components ย่อย ---
        
        // 1. หน้าเข้าสู่ระบบ
        const LoginScreen = ({ onLogin, schoolConfig }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showPwd, setShowPwd] = useState(false);
            const [remember, setRemember] = useState(false);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const savedUser = localStorage.getItem('ns_username');
                const savedPass = localStorage.getItem('ns_password');
                if (savedUser && savedPass) {
                    setUsername(savedUser);
                    setPassword(savedPass);
                    setRemember(true);
                }
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    // เรียกใช้งานฐานข้อมูลจริงผ่าน GAS พร้อมระบุ Sheet ID
                    const res = await callGAS('login', { username, password, targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' });
                    const userData = res.data;
                    
                    // บังคับแนบ username ที่ใช้ล็อกอินเข้าไปใน userData ด้วย เพื่อให้ระบบจำได้เวลาไปใช้เปลี่ยนรหัสผ่าน
                    userData.username = username;

                    // แปลงคำนำหน้าชื่อผู้ใช้ให้ถูกต้องตามตำแหน่ง (ดักจับ Role: executive)
                    if (userData && userData.name) {
                        let originalName = String(userData.name).trim();
                        let cleanName = originalName.replace(/^(นาย|นางสาว|นาง|ด\.ช\.|ด\.ญ\.|ว่าที่\s*ร\.ต\.|ว่าที่ร้อยตรี|ครู|ผู้อำนวยการโรงเรียน|ผู้อำนวยการ|รองผู้อำนวยการ|ผอ\.|รอง)\s*/g, '').trim();
                        
                        if (userData.role === 'executive' || originalName.includes('ผอ.') || originalName.includes('ผู้อำนวยการ')) {
                            // ถ้ามีตำแหน่งบอกว่าเป็นรอง หรือมีคำว่ารองในชื่อ
                            if ((userData.position && String(userData.position).includes('รอง')) || originalName.includes('รอง')) {
                                userData.name = `รอง${cleanName}`;
                            } else {
                                userData.name = `ผอ.${cleanName}`;
                            }
                        } else {
                            userData.name = `ครู${cleanName}`;
                        }
                    }

                    if(remember) {
                        localStorage.setItem('ns_username', username);
                        localStorage.setItem('ns_password', password);
                    } else {
                        localStorage.removeItem('ns_username');
                        localStorage.removeItem('ns_password');
                    }
                    onLogin(userData); // ส่งข้อมูลผู้ใช้เข้าระบบ
                } catch (error) {
                    alert('เข้าสู่ระบบล้มเหลว: ' + error.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-ns-blue p-4">
                    <div className="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md">
                        <div className="text-center mb-8">
                            {schoolConfig && schoolConfig.logo ? (
                                <img src={schoolConfig.logo} alt="School Logo" className="w-auto h-32 mx-auto mb-4 object-contain drop-shadow-md" />
                            ) : (
                                <div className="w-28 h-28 bg-ns-yellow rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg">
                                    <i className="fa-solid fa-graduation-cap text-5xl text-ns-blue"></i>
                                </div>
                            )}
                            <h1 className="text-2xl font-bold text-ns-blue">NS Student Care (NSC)</h1>
                            <p className="text-gray-500 text-sm">{schoolConfig && schoolConfig.name}</p>
                        </div>
                        <form onSubmit={handleLogin}>
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
                                <div className="relative">
                                    <i className="fa-solid fa-user absolute left-3 top-3 text-gray-400"></i>
                                    <input type="text" required value={username} onChange={e=>setUsername(e.target.value)} 
                                        className="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-ns-blue outline-none" placeholder="Username" />
                                </div>
                            </div>
                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                                <div className="relative">
                                    <i className="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i>
                                    <input type={showPwd ? "text" : "password"} required value={password} onChange={e=>setPassword(e.target.value)} 
                                        className="w-full pl-10 pr-10 py-2 border rounded-lg focus:ring-2 focus:ring-ns-blue outline-none" placeholder="Password" />
                                    <i className={`fa-solid ${showPwd ? 'fa-eye-slash' : 'fa-eye'} absolute right-3 top-3 text-gray-400 cursor-pointer`} 
                                        onClick={()=>setShowPwd(!showPwd)}></i>
                                </div>
                            </div>
                            <div className="flex items-center justify-between mb-6">
                                <div className="flex items-center">
                                    <input type="checkbox" id="remember" checked={remember} onChange={e=>setRemember(e.target.checked)} className="mr-2 rounded text-ns-blue" />
                                    <label htmlFor="remember" className="text-sm text-gray-600">จำชื่อผู้ใช้</label>
                                </div>
                            </div>
                            <button type="submit" disabled={loading} 
                                className="w-full bg-ns-blue text-white py-2 rounded-lg hover:bg-blue-800 transition shadow-md font-bold">
                                {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "เข้าสู่ระบบ"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // 2. หน้าสแกนเวลาเข้า-ออก
        const ScannerPopup = ({ onClose, timeSettings, onRecordSaved, records, currentGps, studentList, schoolConfig, behaviorsSetting, behaviorRecords, setBehaviorRecords, user, exemptions }) => {
            const [status, setStatus] = useState("กำลังเตรียมกล้อง...");
            const [scanResult, setScanResult] = useState(null);
            const [duplicateError, setDuplicateError] = useState(null);
            const [lateInfo, setLateInfo] = useState(null);
            const [exemptInfo, setExemptInfo] = useState(null);
            
            const [now, setNow] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => console.log("Full-screen error:", err));
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen().catch(err => console.log("Full-screen error:", err));
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen().catch(err => console.log("Full-screen error:", err));
                }

                return () => {
                    if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                        if (document.exitFullscreen) {
                            document.exitFullscreen().catch(err => console.log(err));
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen().catch(err => console.log(err));
                        } else if (document.msExitFullscreen) {
                            document.msExitFullscreen().catch(err => console.log(err));
                        }
                    }
                };
            }, []);
            
            const latestRecords = useRef(records);
            const latestStudentList = useRef(studentList);
            const latestTimeSettings = useRef(timeSettings);
            const latestBehaviors = useRef(behaviorsSetting || []);
            
            useEffect(() => { latestRecords.current = records; }, [records]);
            useEffect(() => { latestStudentList.current = studentList; }, [studentList]);
            useEffect(() => { latestTimeSettings.current = timeSettings; }, [timeSettings]);
            useEffect(() => { latestBehaviors.current = behaviorsSetting || []; }, [behaviorsSetting]);

            const currentHour = now.getHours();
            const currentMin = now.getMinutes();
            const currentSec = now.getSeconds();
            const timeStr = `${String(currentHour).padStart(2, '0')}:${String(currentMin).padStart(2, '0')}`;
            const timeStrWithSec = `${String(currentHour).padStart(2, '0')}:${String(currentMin).padStart(2, '0')}:${String(currentSec).padStart(2, '0')}`;
            
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear() + 543;
            const dateStr = `${day}/${month}/${year}`;
            
            const { isOutMode, isLate } = determineModeAndLate(timeStr, timeSettings.startIn, timeSettings.lateTime, timeSettings.startOut);
            const modeName = isOutMode ? "บันทึกออกโรงเรียน" : "บันทึกเข้าโรงเรียน";

            useEffect(() => {
                const scanner = new Html5Qrcode("reader");
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                let isGpsValid = false;
                let isProcessingQR = false;

                if (currentGps) {
                    const dist = getDistanceFromLatLonInM(
                        currentGps.lat, currentGps.lng,
                        parseFloat(latestTimeSettings.current.gpsLat), parseFloat(latestTimeSettings.current.gpsLng)
                    );
                    if (dist <= 200) {
                        isGpsValid = true;
                        setStatus("พร้อมสแกนคิวอาร์โค้ด");
                    } else {
                        setStatus(`คุณอยู่นอกพื้นที่โรงเรียน (ระยะห่าง ${Math.round(dist)} เมตร)`);
                    }
                }

                scanner.start({ facingMode: "environment" }, config, 
                    async (decodedText) => {
                        if (isProcessingQR) return; 
                        
                        if(!isGpsValid) {
                            alert("ไม่สามารถบันทึกได้ เนื่องจากคุณอยู่นอกพื้นที่โรงเรียน");
                            return;
                        }

                        isProcessingQR = true;
                        setStatus("กำลังตรวจสอบข้อมูล...");

                        const scanNow = new Date();
                        const scanTimeStr = `${String(scanNow.getHours()).padStart(2, '0')}:${String(scanNow.getMinutes()).padStart(2, '0')}`;
                        const scanDateStr = `${String(scanNow.getDate()).padStart(2, '0')}/${String(scanNow.getMonth() + 1).padStart(2, '0')}/${scanNow.getFullYear() + 543}`;
                        
                        const { isOutMode: scanIsOutMode, isLate: scanIsLate } = determineModeAndLate(scanTimeStr, latestTimeSettings.current.startIn, latestTimeSettings.current.lateTime, latestTimeSettings.current.startOut);
                        const currentType = scanIsOutMode ? "ออก" : "เข้า";

                        const decodedClean = String(decodedText).trim();
                        const studentInfo = latestStudentList.current.find(s => s.code && String(s.code).trim() === decodedClean);
                        
                        if (!studentInfo) {
                            setStatus("ไม่พบข้อมูลนักเรียนในระบบ");
                            setTimeout(() => { setStatus("พร้อมสแกนคิวอาร์โค้ด"); isProcessingQR = false; }, 2000);
                            return;
                        }

                        const isDuplicate = latestRecords.current.some(r => String(r.studentId).trim() === decodedClean && r.date === scanDateStr && r.type === currentType);
                        if (isDuplicate) {
                            setDuplicateError("คุณได้สแกนบันทึกเข้าหรือออกแล้วก่อนหน้านี้");
                            setStatus("ข้อมูลซ้ำ");
                            setTimeout(() => { setDuplicateError(null); setStatus("พร้อมสแกนคิวอาร์โค้ด"); isProcessingQR = false; }, 2000);
                            return;
                        }
                        
                        try {
                            setTimeout(() => {
                                const studentExemption = (exemptions || []).find(ex => String(ex.studentId).trim() === decodedClean);
                                let isExempted = false;
                                if (studentExemption && scanIsLate && currentType === "เข้า") {
                                    isExempted = true; // ให้ยกเว้นไว้ก่อน
                                    // แต่ถ้ามีกำหนดเวลา และเวลาที่สแกน "เกิน" เวลาที่อนุญาต ถือว่าสายตามปกติ
                                    if (studentExemption.allowedLateTime && scanTimeStr > studentExemption.allowedLateTime) {
                                        isExempted = false; 
                                    }
                                }
                                const finalStatusStr = isExempted ? "ยกเว้นสาย" : (scanIsLate ? "สาย" : "ปกติ");

                                const newRecord = {
                                    id: Date.now(),
                                    date: scanDateStr,
                                    studentId: decodedClean,
                                    name: studentInfo.name,
                                    room: `${studentInfo.classLevel}/${studentInfo.room}`,
                                    time: scanTimeStr,
                                    statusStr: finalStatusStr,
                                    type: currentType,
                                    recorder: user ? user.name : 'ระบบอัตโนมัติ'
                                };
                                
                                setScanResult(newRecord);
                                setStatus("บันทึกสำเร็จ");

                                if (isExempted) {
                                    setExemptInfo(studentExemption);
                                } else if (scanIsLate && currentType === "เข้า") {
                                    const pastLates = latestRecords.current.filter(r => String(r.studentId).trim() === decodedClean && String(r.type).trim() === 'เข้า' && String(r.statusStr).trim() === 'สาย');
                                    const lateCount = pastLates.length + 1; 
                                    
                                    let searchKeyword = `ครั้งที่ ${lateCount}`;
                                    if (lateCount > 3) {
                                        searchKeyword = "เกิน 3 ครั้ง";
                                    }

                                    let lateBehavior = latestBehaviors.current.find(b => b.name.includes('สาย') && b.name.includes(searchKeyword));
                                    
                                    if (!lateBehavior) {
                                        let defaultScore = -5;
                                        if (lateCount === 2) defaultScore = -10;
                                        if (lateCount === 3) defaultScore = -15;
                                        if (lateCount > 3) defaultScore = -20;
                                        
                                        lateBehavior = latestBehaviors.current.find(b => b.name.includes('สาย') && !b.name.includes('ครั้ง')) || 
                                                       { name: 'มาโรงเรียนสาย', score: defaultScore, type: 'ลบ' };
                                    }

                                    const deductScore = -Math.abs(Number(lateBehavior.score));
                                    const finalBehaviorName = lateBehavior.name.includes(searchKeyword) ? lateBehavior.name : `${lateBehavior.name} (${searchKeyword})`;

                                    const newBehaviorRecord = {
                                        id: Date.now() + 1,
                                        date: scanDateStr,
                                        studentId: decodedClean,
                                        name: studentInfo.name,
                                        room: `${studentInfo.classLevel}/${studentInfo.room}`,
                                        behaviorName: finalBehaviorName,
                                        score: deductScore,
                                        recorder: (user && user.name) || 'ระบบอัตโนมัติ',
                                        type: 'ลบ'
                                    };

                                    callGAS('saveBehaviorRecord', { ...newBehaviorRecord, targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' })
                                        .catch(e => console.log("Auto behavior error:", e));
                                    
                                    if (setBehaviorRecords) {
                                        setBehaviorRecords(prev => [newBehaviorRecord, ...(prev || [])]);
                                    }
                                    
                                    setLateInfo({ count: lateCount, score: deductScore, label: searchKeyword });
                                } else {
                                    setLateInfo(null);
                                }
                                
                                latestRecords.current = [newRecord, ...latestRecords.current];
                                onRecordSaved(newRecord);

                                setTimeout(() => { setScanResult(null); setLateInfo(null); setExemptInfo(null); setStatus("พร้อมสแกนคิวอาร์โค้ด"); isProcessingQR = false; }, 3000);
                            }, 300);
                        } catch(err) {
                            setStatus("เกิดข้อผิดพลาดในการบันทึก");
                            setTimeout(() => { setStatus("พร้อมสแกนคิวอาร์โค้ด"); isProcessingQR = false; }, 2000);
                        }
                    },
                    (err) => {}
                ).catch(err => setStatus("ไม่สามารถเปิดกล้องได้"));

                return () => { scanner.stop().catch(e => console.log(e)); };
            }, []);

            return (
                <div className="fixed inset-0 z-50 bg-gray-900 flex flex-col overflow-hidden h-full w-full">
                    <div className="bg-ns-blue p-4 flex justify-between items-center shadow-lg relative z-10">
                        <div className="flex items-center space-x-3">
                            {schoolConfig && schoolConfig.logo ? (
                                <img src={schoolConfig.logo} alt="Logo" className="w-12 h-12 object-contain" />
                            ) : (
                                <div className="w-12 h-12 bg-ns-yellow rounded-full flex items-center justify-center">
                                    <i className="fa-solid fa-graduation-cap text-ns-blue text-xl"></i>
                                </div>
                            )}
                            <div>
                                <h1 className="text-xl font-bold text-ns-yellow leading-tight">NS Student Care (NSC)</h1>
                                <p className="text-xs text-white opacity-80">{schoolConfig && schoolConfig.name}</p>
                            </div>
                        </div>
                        <button onClick={onClose} className="text-white bg-red-500 hover:bg-red-600 rounded-full w-10 h-10 flex items-center justify-center text-xl shadow-lg transition-transform transform hover:scale-105">
                            <i className="fa-solid fa-times"></i>
                        </button>
                    </div>

                    <div className="bg-gray-800 text-center py-4 shadow-inner">
                        <div className="text-4xl md:text-6xl font-bold text-ns-yellow tracking-wider font-mono">
                            {timeStrWithSec}
                        </div>
                        <div className="text-gray-300 mt-1">{dateStr} | {modeName}</div>
                    </div>
                    
                    <div className="flex-1 flex flex-col items-center justify-center relative p-4">
                        <div id="reader" className="w-full max-w-md bg-black rounded-2xl overflow-hidden border-4 border-ns-blue shadow-2xl flex items-center justify-center"></div>
                        <div className="mt-6 px-6 py-2 bg-black/70 text-white rounded-full backdrop-blur-sm shadow-md animate-pulse z-20">
                            <i className="fa-solid fa-location-dot mr-2 text-red-400"></i> {status}
                        </div>
                    </div>
                    
                    {scanResult && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity">
                            <div className="bg-white border-b-8 border-green-500 w-full max-w-sm p-6 rounded-2xl shadow-2xl animate-[bounce_0.5s_ease-in-out]">
                                <div className="flex flex-col items-center text-green-600 mb-4 border-b pb-4">
                                    <i className="fa-solid fa-circle-check text-6xl mb-2 drop-shadow-md"></i>
                                    <h3 className="text-3xl font-extrabold text-green-700">บันทึกสำเร็จ</h3>
                                </div>
                                <div className="space-y-3 text-gray-800 text-lg">
                                    <p className="flex justify-between border-b pb-2"><span className="text-gray-500">รหัส:</span> <span className="font-bold">{scanResult.studentId}</span></p>
                                    <p className="flex justify-between border-b pb-2"><span className="text-gray-500">เวลา:</span> <span className="font-bold text-ns-blue">{scanResult.time} น.</span></p>
                                    <div className="border-b pb-2">
                                        <span className="text-gray-500 block text-sm mb-1">ชื่อ-สกุล:</span>
                                        <span className="font-bold block truncate">{scanResult.name}</span>
                                    </div>
                                    <p className="flex justify-between items-center pt-2">
                                        <span className="text-gray-500">สถานะ:</span> 
                                        <span className={`font-bold px-4 py-1 rounded-full text-sm ${scanResult.statusStr === 'สาย' ? 'bg-red-100 text-red-700 border border-red-300' : 'bg-green-100 text-green-700 border border-green-300'}`}>
                                            {scanResult.statusStr}

                                    {lateInfo && (

                                                <i className="fa-solid fa-triangle-exclamation text-xl mr-2"></i>
                                                <span className="font-bold text-lg">มาสาย {lateInfo.label}</span>
                                            </div>
                                            <p className="text-sm">ระบบหักคะแนนพฤติกรรมอัตโนมัติ <span className="font-bold text-red-600 text-lg">{Math.abs(lateInfo.score)}</span> คะแนน</p>
                                        </div>

                                    {exemptInfo && (

                                                <i className="fa-solid fa-shield-heart text-xl mr-2 text-blue-500"></i>
                                                <span className="font-bold text-lg">ได้รับการยกเว้นมาสาย</span>
                                            </div>
                                            <p className="text-sm text-blue-600">สาเหตุ: <strong>{exemptInfo.reason}</strong></p>
                                        </div>
                                    )}
                                </div>

                    {duplicateError && (

                                <div className="flex flex-col items-center text-red-500 mb-2">
                                    <i className="fa-solid fa-triangle-exclamation text-6xl mb-4 drop-shadow-md"></i>
                                    <h3 className="text-xl font-extrabold text-red-600 text-center leading-relaxed">{duplicateError}</h3>
                                </div>
                            </div>
                        </div>

                </div>
            );
        };

        // 3. หน้าเวลาเข้า-ออกโรงเรียน (TimeView)
        const TimeView = ({ timeSettings, records, setRecords, forgotCardRecords, setForgotCardRecords, isSyncing, studentList, schoolConfig, behaviorsSetting, behaviorRecords, setBehaviorRecords, user, exemptions }) => {
            const [showScanner, setShowScanner] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            const [currentGps, setCurrentGps] = useState(null);
            const [isPreparing, setIsPreparing] = useState(false);

            const [selectedRoom, setSelectedRoom] = useState('');

            const [showConfirmManual, setShowConfirmManual] = useState(false);
            const [isProcessingManual, setIsProcessingManual] = useState(false);

            const uniqueClasses = [...new Set(studentList.map(s => s.classLevel).filter(Boolean))].sort();
            const uniqueRooms = [...new Set(studentList.filter(s => s.classLevel === selectedClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));
            const classStudents = studentList.filter(s => s.classLevel === selectedClass && s.room === selectedRoom);

            const forgotCardCount = selectedStudentForManual ? 
                (forgotCardRecords || []).filter(r => String(r.studentId).trim() === String(selectedStudentForManual.code).trim()).length + 1 
                : 1;

            // ฟังก์ชันจัดรูปแบบวันที่ให้เป็น DD/MM/YYYY (พ.ศ.) ป้องกันปี 3112
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                let str = String(dateStr).trim();
                if (str.includes('T') || str.match(/^\d{4}-\d{2}-\d{2}/)) {
                    try {
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) {
                            const day = String(d.getDate()).padStart(2, '0');
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            let year = d.getFullYear();
                            if (year < 2500) year += 543;
                            return `${day}/${month}/${year}`;
                        }
                    } catch(e) {}
                }
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parts[0].padStart(2, '0');
                        const m = parts[1].padStart(2, '0');
                        let y = Number(parts[2]);
                        if (y < 2500 && y > 1900) y += 543;
                        return `${d}/${m}/${y}`;
                    }
                }
                return str;
            };

            // ฟังก์ชันจัดรูปแบบเวลาให้เป็น HH:mm
            const formatDisplayTime = (timeStr) => {
                if (!timeStr) return '';
                if (typeof timeStr === 'string' && !timeStr.includes('T')) return timeStr.substring(0, 5);
                try {
                    const d = new Date(timeStr);
                    if (isNaN(d.getTime())) return timeStr;
                    // บังคับใช้โซนเวลาไทย เพื่อป้องกันเวลาคลาดเคลื่อนจาก Timezone (UTC)
                    return d.toLocaleTimeString('th-TH', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit' });
                } catch(e) { return timeStr; }
            };

            const startScanner = async () => {
                setIsPreparing(true);
                
                if (!hasCamPermission) {
                    try {
                        await navigator.mediaDevices.getUserMedia({ video: true });
                        setHasCamPermission(true);
                    } catch (e) {
                        setIsPreparing(false);
                        alert("กรุณาอนุญาตการเข้าถึงกล้องเพื่อใช้งานการสแกนคิวอาร์โค้ด");
                        return;
                    }
                }

                if (!currentGps) {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                setCurrentGps({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                                setIsPreparing(false);
                                setShowScanner(true);
                            },
                            (err) => {
                                setIsPreparing(false);
                                alert("กรุณาอนุญาตการเข้าถึงพิกัด (GPS) เพื่อใช้งานการสแกน");
                            }
                        );
                    } else {
                        setIsPreparing(false);
                        alert("เบราว์เซอร์ของคุณไม่รองรับ GPS");
                    }
                } else {
                    setIsPreparing(false);
                    setShowScanner(true);
                }
            };

            const handleRecordSaved = async (newRecord) => {
                setRecords(prev => [newRecord, ...prev]);
                try {
                    await callGAS('saveTime', newRecord);
                } catch(e) {
                    console.log("บันทึกเบื้องหลังลง GAS ล้มเหลว", e);
                }
            };

            const handleDelete = async (id) => {
                if(window.confirm("คุณต้องการลบข้อมูลการบันทึกเวลานี้ใช่หรือไม่? ระบบจะลบออกจากฐานข้อมูลด้วย")) {
                    setRecords(records.filter(r => r.id !== id));
                    try {
                        await callGAS('deleteTimeRecord', { id });
                        alert("ลบข้อมูลสำเร็จ");
                    } catch(e) {
                        alert("มีปัญหาในการเชื่อมต่อฐานข้อมูล");
                    }
                }
            };

            const saveEdit = async (e) => {
                e.preventDefault();
                if(window.confirm("คุณต้องการบันทึกการแก้ไขนี้ลงฐานข้อมูลใช่หรือไม่?")) {
                    setRecords(records.map(r => r.id === editingRecord.id ? editingRecord : r));
                    try {
                        await callGAS('editTimeRecord', editingRecord);
                        alert("อัปเดตข้อมูลสำเร็จ");
                    } catch(e) {
                        alert("มีปัญหาในการเชื่อมต่อฐานข้อมูล");
                    }
                    setEditingRecord(null);
                }
            };

            const handleConfirmManualSave = async () => {
                if(!selectedStudentForManual) return;
                
                const studentToSave = selectedStudentForManual;
                setShowConfirmManual(false);
                setSelectedStudentForManual(null);
                setIsProcessingManual(false);

                const scanNow = new Date();
                const scanTimeStr = `${String(scanNow.getHours()).padStart(2, '0')}:${String(scanNow.getMinutes()).padStart(2, '0')}`;
                const scanDateStr = `${String(scanNow.getDate()).padStart(2, '0')}/${String(scanNow.getMonth() + 1).padStart(2, '0')}/${scanNow.getFullYear() + 543}`;
                
                const { isOutMode, isLate: scanIsLate } = determineModeAndLate(scanTimeStr, timeSettings.startIn, timeSettings.lateTime, timeSettings.startOut);
                const currentType = isOutMode ? "ออก" : "เข้า";

                const studentExemption = (exemptions || []).find(ex => String(ex.studentId).trim() === String(studentToSave.code).trim());
                let isExempted = false;
                if (studentExemption && scanIsLate && currentType === "เข้า") {
                    isExempted = true;
                    if (studentExemption.allowedLateTime && scanTimeStr > studentExemption.allowedLateTime) {
                        isExempted = false;
                    }
                }
                const finalStatusStr = isExempted ? "ยกเว้นสาย" : (scanIsLate ? "สาย" : "ปกติ");

                const isDuplicate = records.some(r => String(r.studentId).trim() === String(studentToSave.code).trim() && r.date === scanDateStr && r.type === currentType);
                if (isDuplicate) {
                    setTimeout(() => alert(`นักเรียนถูกบันทึกเวลาเข้า/ออกในรอบนี้ไปแล้ว`), 300);
                    return;
                }

                const newTimeRecord = {
                    id: Date.now(),
                    date: scanDateStr,
                    studentId: studentToSave.code,
                    name: studentToSave.name,
                    room: `${studentToSave.classLevel}/${studentToSave.room}`,
                    time: scanTimeStr,
                    statusStr: finalStatusStr,
                    type: currentType,
                    recorder: user ? user.name : 'ระบบอัตโนมัติ'
                };

                const newForgotCardRecord = {
                    id: Date.now() + 1,
                    date: scanDateStr,
                    studentId: studentToSave.code,
                    name: studentToSave.name,
                    room: `${studentToSave.classLevel}/${studentToSave.room}`,
                    time: scanTimeStr,
                    recorder: user ? user.name : 'ระบบอัตโนมัติ'
                };

                try {
                    setRecords(prev => [newTimeRecord, ...prev]);
                    callGAS('saveTime', newTimeRecord).catch(e => console.log(e));

                    if (setForgotCardRecords) {
                        setForgotCardRecords(prev => [newForgotCardRecord, ...(prev || [])]);
                    }
                    callGAS('saveForgotCardRecord', { ...newForgotCardRecord, targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }).catch(e => console.log(e));

                    if (scanIsLate && currentType === "เข้า" && !isExempted) {
                        const pastLates = records.filter(r => String(r.studentId).trim() === String(studentToSave.code).trim() && String(r.type).trim() === 'เข้า' && String(r.statusStr).trim() === 'สาย');
                        const lateCount = pastLates.length + 1; 
                        let searchKeyword = `ครั้งที่ ${lateCount}`;
                        if (lateCount > 3) searchKeyword = "เกิน 3 ครั้ง";

                        let lateBehavior = (behaviorsSetting || []).find(b => b.name.includes('สาย') && b.name.includes(searchKeyword));
                        if (!lateBehavior) {
                            let defaultScore = -5;
                            if (lateCount === 2) defaultScore = -10;
                            if (lateCount === 3) defaultScore = -15;
                            if (lateCount > 3) defaultScore = -20;
                            lateBehavior = (behaviorsSetting || []).find(b => b.name.includes('สาย') && !b.name.includes('ครั้ง')) || { name: 'มาโรงเรียนสาย', score: defaultScore, type: 'ลบ' };
                        }

                        const deductScore = -Math.abs(Number(lateBehavior.score));
                        const finalBehaviorName = lateBehavior.name.includes(searchKeyword) ? lateBehavior.name : `${lateBehavior.name} (${searchKeyword})`;

                        const newBehaviorRecord = {
                            id: Date.now() + 2,
                            date: scanDateStr,
                            studentId: studentToSave.code,
                            name: studentToSave.name,
                            room: `${studentToSave.classLevel}/${studentToSave.room}`,
                            behaviorName: finalBehaviorName,
                            score: deductScore,
                            recorder: 'ระบบอัตโนมัติ (ลงมือ)',
                            type: 'ลบ'
                        };

                        callGAS('saveBehaviorRecord', { ...newBehaviorRecord, targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }).catch(e => console.log(e));
                        if (setBehaviorRecords) setBehaviorRecords(prev => [newBehaviorRecord, ...(prev || [])]);
                    }

                    setTimeout(() => {
                        let msg = `บันทึกเวลาเข้า-ออก และประวัติลืมบัตรสำเร็จ!\n(${studentToSave.name})`;
                        if (isExempted) msg += `\n\n* ได้รับการยกเว้นมาสาย: ${studentExemption.reason}`;
                        alert(msg);
                    }, 300);
                } catch(e) {
                    setTimeout(() => alert('เกิดข้อผิดพลาดในการบันทึกเบื้องหลัง: ' + e.message), 300);
                }
            };

            return (
                <div className="space-y-6 relative">
                    <div className="bg-white p-8 rounded-xl shadow-sm text-center border-t-4 border-ns-blue">

                        <div className="mt-6 pt-6 border-t border-gray-200">
                            <button onClick={() => setShowManualEntry(!showManualEntry)} className="text-ns-blue font-bold hover:underline flex items-center justify-center mx-auto">
                                <i className="fa-solid fa-id-card mr-2"></i> {showManualEntry ? 'ซ่อนการค้นหาด้วยชั้น/ห้อง' : 'กรณีนักเรียนลืมบัตร (ค้นหาด้วยชั้น/ห้อง)'}
                            </button>
                            
                            {showManualEntry && (
                                <div className="mt-4 max-w-3xl mx-auto bg-blue-50 p-6 rounded-xl border border-blue-100 text-left animate-[fadeIn_0.3s_ease-out]">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-sm text-ns-blue font-bold mb-1">1. เลือกชั้นเรียน</label>
                                            <select value={selectedClass} onChange={e=>{setSelectedClass(e.target.value); setSelectedRoom(''); setSelectedStudentForManual(null);}} className="w-full border-2 border-blue-200 rounded-lg p-2 focus:ring-2 focus:ring-ns-blue outline-none">
                                                <option value="">-- เลือกชั้น --</option>
                                                {uniqueClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-ns-blue font-bold mb-1">2. เลือกห้อง</label>
                                            <select value={selectedRoom} onChange={e=>{setSelectedRoom(e.target.value); setSelectedStudentForManual(null);}} className="w-full border-2 border-blue-200 rounded-lg p-2 focus:ring-2 focus:ring-ns-blue outline-none" disabled={!selectedClass}>
                                                <option value="">-- เลือกห้อง --</option>
                                                {uniqueRooms.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-ns-blue font-bold mb-1">3. เลือกนักเรียน</label>
                                            <select onChange={e => {
                                                const id = e.target.value;
                                                const found = studentList.find(s => String(s.id) === String(id));
                                                if(found) {
                                                    setSelectedStudentForManual(found);
                                                    setShowConfirmManual(true);
                                                    e.target.value = "";

       // 4. หน้าต่างจัดการพฤติกรรม (BehaviorView)
        const BehaviorView = ({ students, behaviorsSetting, records, setRecords, user, isSyncing }) => {
            const TARGET_SHEET_ID = '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48';

            const [searchMethod, setSearchMethod] = useState('id');

            const [selectedClass, setSelectedClass] = useState('');
            const [selectedRoom, setSelectedRoom] = useState('');

            const [filterClass, setFilterClass] = useState('');
            const [filterRoom, setFilterRoom] = useState('');

            const uniqueClasses = [...new Set(students.map(s => s.classLevel).filter(Boolean))].sort();
            const uniqueRooms = [...new Set(students.filter(s => s.classLevel === selectedClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));
            const classStudents = students.filter(s => s.classLevel === selectedClass && s.room === selectedRoom);
            const availableBehaviors = behaviorsSetting.filter(b => b.type === activeMode);

            // ข้อมูลห้องสำหรับ Dropdown ตัวกรอง
            const filterUniqueRooms = [...new Set(students.filter(s => s.classLevel === filterClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));

            // กรองข้อมูลตารางประวัติ
            const filteredRecords = records.filter(r => {
                if (!filterClass && !filterRoom) return true;
                
                // สมมติว่า r.room ถูกบันทึกในรูปแบบ "ม.1/1" หรือ "ชั้น/ห้อง"
                const [rClass, rRoom] = (r.room || '').split('/');
                
                if (filterClass && filterRoom) {
                    return rClass === filterClass && rRoom === filterRoom;
                } else if (filterClass) {
                    return rClass === filterClass;
                }
                return true;
            });

            // ฟังก์ชันจัดรูปแบบวันที่ให้เป็น DD/MM/YYYY (พ.ศ.) ป้องกันปี 3112
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                let str = String(dateStr).trim();
                if (str.includes('T') || str.match(/^\d{4}-\d{2}-\d{2}/)) {
                    try {
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) {
                            const day = String(d.getDate()).padStart(2, '0');
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            let year = d.getFullYear();
                            if (year < 2500) year += 543;
                            return `${day}/${month}/${year}`;
                        }
                    } catch(e) {}
                }
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parts[0].padStart(2, '0');
                        const m = parts[1].padStart(2, '0');
                        let y = Number(parts[2]);
                        if (y < 2500 && y > 1900) y += 543;
                        return `${d}/${m}/${y}`;
                    }
                }
                return str;
            };

            const handleSearchById = () => {
                if(!searchId) return;
                const found = students.find(s => String(s.code).trim() === String(searchId).trim());
                if (found) {
                    setSelectedStudent(found);
                } else {
                    showToast('error', 'ไม่พบข้อมูล', 'รหัสประจำตัวไม่ถูกต้อง');
                    setSelectedStudent(null);
                }
            };

            const handleBehaviorChange = (e) => {
                const bId = e.target.value;
                setSelectedBehaviorId(bId);
                const b = behaviorsSetting.find(item => String(item.id) === String(bId));
                if (b) setScoreToRecord(Number(b.score));
                else setScoreToRecord(0);
            };

            const handleSaveRecord = async () => {
                if (!selectedStudent || !selectedBehaviorId) return;
                
                const bData = behaviorsSetting.find(item => String(item.id) === String(selectedBehaviorId));
                if(!bData) return;

                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear() + 543;
                const dateStr = `${day}/${month}/${year}`;

                const isDuplicate = records.some(r => r.date === dateStr && String(r.studentId).trim() === String(selectedStudent.code).trim() && r.behaviorName === bData.name);
                if (isDuplicate) {
                    showToast('error', 'ข้อมูลซ้ำ', `${selectedStudent.name} ถูกบันทึกพฤติกรรมนี้แล้ววันนี้`);
                    return;
                }

                setIsProcessing(true);

                const newRecord = {
                    id: Date.now(),
                    date: dateStr,
                    studentId: selectedStudent.code,
                    name: selectedStudent.name,
                    room: `${selectedStudent.classLevel}/${selectedStudent.room}`,
                    behaviorName: bData.name,
                    score: scoreToRecord,
                    recorder: (user && user.name) || 'Admin',
                    type: activeMode
                };

                try {
                    await callGAS('saveBehaviorRecord', { ...newRecord, targetSheetId: TARGET_SHEET_ID });
                    setRecords([newRecord, ...records]);
                    showToast('success', 'บันทึกสำเร็จ', `${selectedStudent.name} ชั้น ${selectedStudent.classLevel}/${selectedStudent.room}`);
                    
                    setSelectedStudent(null);
                    setSearchId('');
                    setSelectedBehaviorId('');
                    setScoreToRecord(0);
                } catch (error) {
                    showToast('error', 'บันทึกล้มเหลว', error.message);
                }
                setIsProcessing(false);
            };

            const handleDeleteConfirm = async () => {
                if (!deletingRecordId) return;
                setIsProcessing(true);
                try {
                    await callGAS('deleteBehaviorRecord', { id: deletingRecordId, targetSheetId: TARGET_SHEET_ID });
                    setRecords(records.filter(r => r.id !== deletingRecordId));
                    setDeletingRecordId(null);
                } catch(error) {
                    console.error('ลบล้มเหลว: ' + error.message);
                }
                setIsProcessing(false);
            };

            const saveEdit = async (e) => {
                e.preventDefault();
                setIsProcessing(true);
                try {
                    await callGAS('editBehaviorRecord', { ...editingRecord, targetSheetId: TARGET_SHEET_ID });
                    setRecords(records.map(r => r.id === editingRecord.id ? editingRecord : r));
                    setEditingRecord(null);
                } catch(err) {
                    console.error("อัปเดตล้มเหลว: " + err.message);
                }
                setIsProcessing(false);
            };

            const InlineScanner = () => {
                useEffect(() => {
                    const scanner = new Html5Qrcode("behavior-qr-reader");
                    const config = { fps: 10, qrbox: { width: 200, height: 200 } };
                    let isProcessingQR = false; 
                    
                    scanner.start({ facingMode: "environment" }, config, 
                        (decodedText) => {
                            if (isProcessingQR) return;
                            isProcessingQR = true;
                            
                            const decodedClean = String(decodedText).trim();
                            setSearchId(decodedClean);
                            
                            scanner.stop().then(() => {
                                setShowScannerPopup(false);
                                const found = students.find(s => String(s.code).trim() === decodedClean);
                                if (found) {
                                    setSelectedStudent(found);
                                    showToast('success', 'พบข้อมูล', `${found.name}`);
                                } else {
                                    showToast('error', 'ไม่พบข้อมูล', `รหัส: ${decodedClean}`);
                                }
                            }).catch(e => {
                                setShowScannerPopup(false);
                            });
                        },
                        (err) => {}
                    ).catch(e => {
                        console.error(e);
                        showToast('error', 'ข้อผิดพลาด', 'ไม่สามารถเปิดกล้องได้');
                        setShowScannerPopup(false);
                    });

                    return () => {
                        if(scanner.isScanning) scanner.stop().catch(e => console.log(e));
                    };
                }, []);

                return (
                    <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                        <div className="bg-white p-4 rounded-xl w-full max-w-sm relative">
                            <button onClick={() => setShowScannerPopup(false)} className="absolute -top-4 -right-4 bg-red-500 text-white w-8 h-8 rounded-full z-10 hover:bg-red-600"><i className="fa-solid fa-times"></i></button>
                            <h3 className="text-center font-bold text-ns-blue mb-2">สแกนรหัสประจำตัวนักเรียน</h3>
                            <div id="behavior-qr-reader" className="w-full overflow-hidden rounded-lg border-2 border-ns-blue"></div>
                        </div>
                    </div>
                );
            };

            return (

                        >

                            onClick={() => { setActiveMode('ลบ'); setSelectedStudent(null); setSelectedBehaviorId(''); }}

                                    <button onClick={() => setShowScannerPopup(true)} className="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-black"><i className="fa-solid fa-qrcode"></i> สแกน</button>

                                            </select>
                                        </div>

                                        <div className="text-center w-full md:w-32">
                                            <div className={`text-3xl font-extrabold ${activeMode === 'บวก' ? 'text-green-600' : 'text-red-600'}`}>
                                                {activeMode === 'บวก' && scoreToRecord > 0 ? '+' : ''}{scoreToRecord}
                                            </div>
                                            <p className="text-xs text-gray-500">คะแนน</p>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-4 text-right">
                                        <button 
                                            onClick={handleSaveRecord}
                                            disabled={!selectedBehaviorId || isProcessing}
                                            className={`px-8 py-2 rounded-lg font-bold text-white shadow-md transition ${!selectedBehaviorId ? 'bg-gray-400 cursor-not-allowed' : (activeMode === 'บวก' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700')}`}
                                        >
                                            {isProcessing ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-check-circle mr-2"></i>}

                                        </button>
                                    </div>
                                </div>

                        </div>
                    )}

                    <div className="bg-white p-6 rounded-xl shadow-sm">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b pb-4 gap-4">
                            <h2 className="text-xl font-bold text-ns-blue flex-shrink-0">
                                <i className="fa-solid fa-clock-rotate-left mr-2"></i> ประวัติการบันทึก
                            </h2>
                            
                            <div className="flex flex-wrap items-center gap-2 bg-gray-50 p-2 rounded-lg border w-full md:w-auto">
                                <span className="text-sm font-bold text-gray-700"><i className="fa-solid fa-filter mr-1"></i>ตัวกรอง:</span>
                                <select 
                                    value={filterClass} 
                                    onChange={e => { setFilterClass(e.target.value); setFilterRoom(''); }} 
                                    className="border rounded-md p-1 text-sm outline-none focus:ring-2 focus:ring-ns-blue bg-white"
                                >
                                    <option value="">ทุกระดับชั้น</option>
                                    {uniqueClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select 
                                    value={filterRoom} 
                                    onChange={e => setFilterRoom(e.target.value)} 
                                    className="border rounded-md p-1 text-sm outline-none focus:ring-2 focus:ring-ns-blue bg-white" 
                                    disabled={!filterClass}
                                >
                                    <option value="">ทุกห้อง</option>
                                    {filterUniqueRooms.map(r => <option key={r} value={r}>{r}</option>)}
                                </select>
                                {(filterClass || filterRoom) && (
                                    <button 
                                        onClick={() => { setFilterClass(''); setFilterRoom(''); }}
                                        className="text-red-500 hover:text-red-700 text-sm ml-1 bg-red-50 p-1 rounded-md px-2"
                                        title="ล้างตัวกรอง"
                                    >
                                        ล้าง <i className="fa-solid fa-times"></i>
                                    </button>
                                )}
                            </div>

                            {isSyncing && <span className="text-sm text-gray-500 animate-pulse flex-shrink-0"><i className="fa-solid fa-sync fa-spin mr-1"></i></span>}
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="bg-gray-100 text-gray-700">
                                    <tr>
                                        <th className="p-3 border text-center">วันที่</th>
                                        <th className="p-3 border">รหัสประจำตัว</th>
                                        <th className="p-3 border">ชื่อ-สกุล</th>
                                        <th className="p-3 border text-center">ชั้น/ห้อง</th>
                                        <th className="p-3 border">รายการพฤติกรรม</th>
                                        <th className="p-3 border text-center">คะแนน</th>
                                        <th className="p-3 border text-center">ผู้บันทึก</th>
                                        <th className="p-3 border text-center w-24">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredRecords.length === 0 ? (
                                        <tr><td colSpan="8" className="text-center p-6 text-gray-400">ยังไม่มีประวัติการบันทึกพฤติกรรม หรือไม่พบข้อมูลตามตัวกรอง</td></tr>
                                    ) : (
                                        filteredRecords.map(r => (
                                            <tr key={r.id} className="border-b hover:bg-gray-50">
                                                <td className="p-2 border text-center">{formatDisplayDate(r.date)}</td>
                                                <td className="p-2 border font-medium">{r.studentId}</td>
                                                <td className="p-2 border">{r.name}</td>
                                                <td className="p-2 border text-center">{r.room}</td>
                                                <td className="p-2 border">
                                                    <span className={`inline-block w-2 h-2 rounded-full mr-2 ${r.type === 'บวก' || Number(r.score) > 0 ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                                    {r.behaviorName}
                                                </td>
                                                <td className={`p-2 border text-center font-bold ${r.type === 'บวก' || Number(r.score) > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                    {r.type === 'บวก' && Number(r.score) > 0 ? '+' : ''}{r.score}
                                                </td>
                                                <td className="p-2 border text-center text-gray-500 text-xs">{r.recorder}</td>
                                                <td className="p-2 border text-center space-x-2">
                                                    <button onClick={() => setEditingRecord({...r, date: formatDisplayDate(r.date)})} className="text-blue-500 hover:text-blue-700 bg-blue-50 p-1.5 rounded"><i className="fa-solid fa-edit"></i></button>
                                                    <button onClick={() => setDeletingRecordId(r.id)} className="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded"><i className="fa-solid fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {editingRecord && (
                        <div className="fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg">
                                <h3 className="text-xl font-bold text-ns-blue mb-4 border-b pb-2"><i className="fa-solid fa-pen-to-square mr-2"></i> แก้ไขประวัติพฤติกรรม</h3>
                                <form onSubmit={saveEdit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-600 mb-1">รหัสประจำตัว</label>
                                            <input type="text" value={editingRecord.studentId} className="w-full border rounded p-2 bg-gray-100" readOnly />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-600 mb-1">ชั้น/ห้อง</label>
                                            <input type="text" value={editingRecord.room} className="w-full border rounded p-2 bg-gray-100" readOnly />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-sm text-gray-600 mb-1">ชื่อ-สกุล</label>
                                            <input type="text" value={editingRecord.name} className="w-full border rounded p-2 bg-gray-100" readOnly />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-sm text-gray-600 mb-1">รายการพฤติกรรม</label>
                                            <input type="text" value={editingRecord.behaviorName} onChange={e=>setEditingRecord({...editingRecord, behaviorName: e.target.value})} className="w-full border rounded p-2 focus:ring focus:ring-ns-blue" required />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-600 mb-1">คะแนน</label>
                                            <input type="number" value={editingRecord.score} onChange={e=>setEditingRecord({...editingRecord, score: e.target.value})} className="w-full border rounded p-2 focus:ring focus:ring-ns-blue" required />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-600 mb-1">ประเภท</label>
                                            <select value={editingRecord.type || (Number(editingRecord.score) > 0 ? 'บวก' : 'ลบ')} onChange={e=>setEditingRecord({...editingRecord, type: e.target.value})} className="w-full border rounded p-2">
                                                <option value="บวก">บวก</option>
                                                <option value="ลบ">ลบ</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex justify-end space-x-3 mt-6 pt-4 border-t">
                                        <button type="button" onClick={() => setEditingRecord(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">ยกเลิก</button>
                                        <button type="submit" disabled={isProcessing} className="px-4 py-2 bg-ns-blue text-white rounded hover:bg-blue-800 shadow flex items-center">
                                            {isProcessing ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : null}
                                            {isProcessing ? 'กำลังบันทึก...' : 'ยืนยันการแก้ไข'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {deletingRecordId && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center animate-[bounce_0.3s_ease-in-out]">
                                <i className="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4"></i>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบข้อมูล</h3>
                                <p className="text-sm text-gray-600 mb-6">คุณต้องการลบข้อมูลประวัติพฤติกรรมนี้ใช่หรือไม่? ข้อมูลจะถูกลบออกจากฐานข้อมูลอย่างถาวร</p>
                                <div className="flex justify-center space-x-3">
                                    <button onClick={() => setDeletingRecordId(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">ยกเลิก</button>
                                    <button onClick={handleDeleteConfirm} disabled={isProcessing} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 shadow flex items-center transition">
                                        {isProcessing ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-trash mr-2"></i>}
                                        {isProcessing ? 'กำลังลบ...' : 'ยืนยันการลบ'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showScannerPopup && <InlineScanner />}

                    {toast && (
                        <div className={`fixed top-6 right-6 z-[100] bg-white border-l-8 shadow-2xl rounded-xl p-4 flex items-center min-w-[280px] animate-[bounce_0.3s_ease-in-out] ${toast.type === 'error' ? 'border-red-500' : 'border-green-500'}`}>
                            <i className={`fa-solid ${toast.type === 'error' ? 'fa-circle-xmark text-red-500' : 'fa-circle-check text-green-500'} text-3xl mr-3`}></i>
                            <div>
                                <h4 className="font-bold text-gray-800">{toast.title}</h4>
                                <p className="text-sm text-gray-600">{toast.message}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 5. หน้าตรวจสอบคะแนนพฤติกรรม (CheckBehaviorView)
        const CheckBehaviorView = ({ students, behaviorRecords, schoolConfig }) => {
            const [searchMethod, setSearchMethod] = useState('id');
            const [searchId, setSearchId] = useState('');
            const [selectedClass, setSelectedClass] = useState('');
            const [selectedRoom, setSelectedRoom] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [showScannerPopup, setShowScannerPopup] = useState(false);

            const uniqueClasses = [...new Set(students.map(s => s.classLevel).filter(Boolean))].sort();
            const uniqueRooms = [...new Set(students.filter(s => s.classLevel === selectedClass).map(s => s.room).filter(Boolean))].sort((a,b) => Number(a) - Number(b));
            const classStudents = students.filter(s => s.classLevel === selectedClass && s.room === selectedRoom);

            // ฟังก์ชันจัดรูปแบบวันที่ให้เป็น DD/MM/YYYY (พ.ศ.) ป้องกันปี 3112
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                let str = String(dateStr).trim();
                if (str.includes('T') || str.match(/^\d{4}-\d{2}-\d{2}/)) {
                    try {
                        const d = new Date(str);
                        if (!isNaN(d.getTime())) {
                            const day = String(d.getDate()).padStart(2, '0');
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            let year = d.getFullYear();
                            if (year < 2500) year += 543;
                            return `${day}/${month}/${year}`;
                        }
                    } catch(e) {}
                }
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parts[0].padStart(2, '0');
                        const m = parts[1].padStart(2, '0');
                        let y = Number(parts[2]);
                        if (y < 2500 && y > 1900) y += 543;
                        return `${d}/${m}/${y}`;
                    }
                }
                return str;
            };

            const handleSearchById = () => {
                if(!searchId) return;
                const found = students.find(s => String(s.code).trim() === String(searchId).trim());
                if (found) {
                    setSelectedStudent(found);
                } else {
                    alert('ไม่พบข้อมูลนักเรียนรหัสนี้');
                    setSelectedStudent(null);
                }
            };

            // แก้ไข: เพิ่ม String() เพื่อป้องกัน TypeError ในกรณีที่ข้อมูลไม่ใช่ข้อความ และจัดการคำนำหน้า ผอ./รอง
            const formatRecorderName = (name) => {
                if (!name || String(name).trim() === 'ระบบอัตโนมัติ') return name;
                let originalName = String(name).trim();
                let cleanName = originalName.replace(/^(นาย|นางสาว|นาง|ด\.ช\.|ด\.ญ\.|ว่าที่\s*ร\.ต\.|ว่าที่ร้อยตรี|ครู|ผู้อำนวยการโรงเรียน|ผู้อำนวยการ|รองผู้อำนวยการ|ผอ\.|รอง)\s*/g, '').trim();
                
                if (originalName.includes('รองผู้อำนวยการ') || originalName.includes('รอง')) {
                    return `รอง${cleanName}`;
                } else if (originalName.includes('ผู้อำนวยการ') || originalName.includes('ผอ.')) {
                    return `ผอ.${cleanName}`;
                }
                return `ครู${cleanName}`;
            };

            let maxScore = schoolConfig && schoolConfig.maxBehaviorScore ? Number(schoolConfig.maxBehaviorScore) : 100;
            let positiveRecords = [];
            let negativeRecords = [];
            let posScore = 0;
            let negScore = 0;

            if (selectedStudent) {
                const studentRecords = behaviorRecords.filter(r => String(r.studentId).trim() === String(selectedStudent.code).trim());
                studentRecords.forEach(r => {
                    const s = Number(r.score);
                    if (r.type === 'บวก' || s > 0) {
                        positiveRecords.push(r);
                        posScore += Math.abs(s);
                    } else {
                        negativeRecords.push(r);
