            const normalizeTimeStr = (val) => {
                if (!val) return '';
                let strVal = String(val).trim();

                // 1. ถ้ามาเป็นข้อความปกติ เช่น "06:30" หรือ "6:30:00"
                const timeMatch = strVal.match(/^(\d{1,2}):(\d{2})/);
                if (timeMatch) {
                    return `${String(timeMatch[1]).padStart(2, '0')}:${timeMatch[2]}`;
                }

                // 2. ถ้ารูปแบบส่งมาจากชีทเป็น ISO Date เช่น "1899-12-29T23:47:56.000Z"
                // Google Sheets มีบัคเวลาเก่าไทย (ปี 1899 ใช้โซนเวลา +06:42:04) ทำให้เวลาหดไป 18 นาที
                // เราต้องให้เบราว์เซอร์ช่วยแปลงกลับโดยใช้ Date Object ของ JavaScript
                if (strVal.includes('T') && strVal.includes('Z')) {
                    try {
                        const d = new Date(strVal);
                        if (!isNaN(d.getTime())) {
                            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                        }
                    } catch(e) {}
                }

                // 3. กรณีบังเอิญชีทส่งมาเป็นเลขทศนิยมล้วนๆ (เช่น 0.27083 = 06:30)
                if (typeof val === 'number') {
                    const totalMins = Math.round(val * 24 * 60);
                    const h = Math.floor(totalMins / 60) % 24;
                    const m = totalMins % 60;
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                }

                // 4. เผื่อหลุดมาเป็นรูปแบบอื่น
                if (strVal.includes('T')) {
                    const timePart = strVal.split('T')[1];
                    if (timePart && timePart.length >= 5) {
                        return timePart.substring(0, 5);
                    }
                }

                return strVal;
            };
            // 👆 -------------------------------------------------- 👆

            const fetchStudentsFromDirectSheet = async () => {
                try {
                    const sheetId = '1Ps1AM4eqxLeDw_GJPW2ZJp3_7pjuLVo8z7tDgTqx1tU';
                    const sheetName = 'ข้อมูลนักเรียน';
                    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&cb=${Date.now()}`;
                    
                    const response = await fetch(url);
                    if (!response.ok) return null;
                    const csvText = await response.text();
                    if (csvText.trim().toLowerCase().startsWith('<!doctype') || csvText.trim().toLowerCase().startsWith('<html')) {
                        throw new Error('ไม่สามารถดึง CSV ได้ (ติดสิทธิ์การเข้าถึง)');
                    }
                    
                    const rows = [];
                    let quote = false;
                    let row = 0, col = 0;
                    for (let c = 0; c < csvText.length; c++) {
                        let cc = csvText[c], nc = csvText[c+1];
                        rows[row] = rows[row] || [];
                        rows[row][col] = rows[row][col] || '';
                        if (cc === '"' && quote && nc === '"') { rows[row][col] += cc; ++c; continue; }
                        if (cc === '"') { quote = !quote; continue; }
                        if (cc === ',' && !quote) { ++col; continue; }
                        if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                        if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                        rows[row][col] += cc;
                    }
                    
                    if (rows.length > 1) {
                        const parsedStudents = [];
                        for(let i=1; i<rows.length; i++) {
                            const cols = rows[i];
                            if (!cols || cols.length === 0) continue;
                            
                            const id = cols[0]; 
                            const code = cols[1]; 
                            if (!code || code.trim() === '') continue;

                            const name = cols[2] || 'ไม่ระบุชื่อ'; 
                            const classRoomStr = cols[3] || ''; 
                            const classRoomArr = classRoomStr.split('/');
                            
                            parsedStudents.push({
                                id: id || code,
                                code: code,
                                name: name,
                                classLevel: classRoomArr[0] ? classRoomArr[0].trim() : '',
                                room: classRoomArr[1] ? classRoomArr[1].trim() : '',
                                program: cols[4] || '', 
                                dob: cols[5] || '', 
                                advisor: cols[6] || '', 
                                address: cols[7] || '', 
                                parentName: cols[8] || '', 
                                parentTel: cols[9] || '', 
                                photoBase64: cols[10] || '' 
                            });
                        }
                        return parsedStudents;
                    }
                } catch(e) {
                    console.error("Direct Sheet Fetch Error:", e);
                }
                return null;
            };

            const syncGlobalData = async () => {
                setIsSyncing(true);
                try {
                    const [initialRes, behaviorRecordsRes, activityRecordsRes, forgotCardRecordsRes, leaveRecordsRes, registrationsRes, studentsRes, provRes, directSheetStudentsRes, usersRes, teachersRes, exemptionsRes, schedulesRes] = await Promise.allSettled([
                        callGAS('getInitialData'),
                        callGAS('getBehaviorRecords', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }), 
                        callGAS('getActivityRecords', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }), 
                        callGAS('getForgotCardRecords', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }), 
                        callGAS('getLeaveRecords', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }), 
                        callGAS('getRegistrations'), 
                        callGAS('getStudents'),
                        callGAS('getProvinces'),
                        fetchStudentsFromDirectSheet(),
                        callGAS('getUsers', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }),
                        callGAS('getTeachers', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }),
                        callGAS('getExemptions', { targetSheetId: '1MhcJlaASLVPzPNb3u1JUoVOIW381b2CD41VdoSAUj48' }),
                        callGAS('getSchedules', { targetSheetId: '1pgvYO_Qh9m-3HkLV3kbyOyK-ztdO1Vb2yNTxk3X6RV0' }) // ดึงตารางสอนทั้งหมดไว้ล่วงหน้า
                    ]);

                    if (initialRes.status === 'fulfilled' && initialRes.value && initialRes.value.data) {
                        const data = initialRes.value.data;
                        if (data.timeRecords) setGlobalTimeRecords(data.timeRecords);
                        if (data.settings) {
                            if (data.settings.schoolName || data.settings.logo || data.settings.maxBehaviorScore !== undefined) {
                                setSchoolConfig(prev => ({ 
                                    ...prev, 
                                    name: data.settings.schoolName || prev.name, 
                                    logo: data.settings.logo || prev.logo,
                                    maxBehaviorScore: data.settings.maxBehaviorScore || prev.maxBehaviorScore || 100
                                }));
                            }
                            if (data.settings.timeSettings) {
                                setTimeSettings({
                                    startIn: normalizeTimeStr(data.settings.timeSettings.startIn),
                                    lateTime: normalizeTimeStr(data.settings.timeSettings.lateTime),
                                    startOut: normalizeTimeStr(data.settings.timeSettings.startOut),
                                    gpsLat: data.settings.timeSettings.gpsLat || '',
                                    gpsLng: data.settings.timeSettings.gpsLng || ''
                                });
                            }
                            if (data.settings.behaviors) setGlobalBehaviors(data.settings.behaviors);
                            if (data.settings.rolePermissions && Object.keys(data.settings.rolePermissions).length > 0) {
                                setRolePermissions(data.settings.rolePermissions);
                            }
                            if (data.settings.activities) {
                                setSchoolConfig(prev => ({...prev, activities: data.settings.activities}));
                            }
                            if (data.settings.periodSettings) {
                                setGlobalPeriodSettings(data.settings.periodSettings);
                            }
                            if (data.settings.lineNotifySettings) {
                                setGlobalLineNotifySettings(data.settings.lineNotifySettings);
                            }
                            if (data.settings.msRiskLimit !== undefined || data.settings.msRiskPercent !== undefined) {
                                setSchoolConfig(prev => ({
                                    ...prev, 
                                    msRiskLimit: data.settings.msRiskLimit !== undefined ? data.settings.msRiskLimit : 3,
                                    msRiskPercent: data.settings.msRiskPercent !== undefined ? data.settings.msRiskPercent : 80
                                }));
                            }
                        }
                    }

                    if (behaviorRecordsRes.status === 'fulfilled' && behaviorRecordsRes.value && behaviorRecordsRes.value.status === 'success') {
                        setGlobalBehaviorRecords(behaviorRecordsRes.value.data || []);
                    }

                    if (activityRecordsRes.status === 'fulfilled' && activityRecordsRes.value && activityRecordsRes.value.status === 'success') {
                        setGlobalActivityRecords(activityRecordsRes.value.data || []);
                    }

                    if (forgotCardRecordsRes.status === 'fulfilled' && forgotCardRecordsRes.value && forgotCardRecordsRes.value.status === 'success') {
                        setGlobalForgotCardRecords(forgotCardRecordsRes.value.data || []);
                    }

                    if (leaveRecordsRes.status === 'fulfilled' && leaveRecordsRes.value && leaveRecordsRes.value.status === 'success') {
                        setGlobalLeaveRecords(leaveRecordsRes.value.data || []);
                    }

                    if (registrationsRes.status === 'fulfilled' && registrationsRes.value && registrationsRes.value.status === 'success') {
                        setGlobalRegistrations(registrationsRes.value.data || []);
                    }

                    let loadedStudents = [];
                    if (directSheetStudentsRes.status === 'fulfilled' && directSheetStudentsRes.value && directSheetStudentsRes.value.length > 0) {
                        loadedStudents = directSheetStudentsRes.value;
                    } else if (studentsRes.status === 'fulfilled' && studentsRes.value && studentsRes.value.status === 'success') {
                        loadedStudents = studentsRes.value.data || [];
                    }
                    setGlobalStudents(loadedStudents);

                    if (provRes.status === 'fulfilled' && provRes.value && provRes.value.status === 'success') {
                        setGlobalProvinces(provRes.value.data || []);
                    }

                    if (usersRes.status === 'fulfilled' && usersRes.value && usersRes.value.status === 'success') {
                        setGlobalUsers(usersRes.value.data || []);
                    }

                    if (teachersRes && teachersRes.status === 'fulfilled' && teachersRes.value && teachersRes.value.status === 'success') {
                        setGlobalTeachers(teachersRes.value.data || []);
                    }

                    if (exemptionsRes && exemptionsRes.status === 'fulfilled' && exemptionsRes.value && exemptionsRes.value.status === 'success') {
                        setGlobalExemptions(exemptionsRes.value.data || []);
                    }

                    // อัปเดตข้อมูลตารางสอนลง Global State
                    if (schedulesRes && schedulesRes.status === 'fulfilled' && schedulesRes.value && schedulesRes.value.status === 'success') {
                        setGlobalSchedules(schedulesRes.value.data || []);
                    }

                } catch (error) {
                    console.error("Background sync failed:", error);
                }
                setIsSyncing(false);
            };

            useEffect(() => {
                syncGlobalData();
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            if (!user) return <LoginScreen onLogin={setUser} schoolConfig={schoolConfig} />;

            const userAllowedMenus = rolePermissions[user.role] || [];
            const menus = allMenus.filter(m => userAllowedMenus.includes(m.id));

            const renderContent = () => {
                switch(currentView) {
                    case 'time':
                        return <TimeView timeSettings={timeSettings} records={globalTimeRecords} setRecords={setGlobalTimeRecords} forgotCardRecords={globalForgotCardRecords} setForgotCardRecords={setGlobalForgotCardRecords} isSyncing={isSyncing} studentList={globalStudents} schoolConfig={schoolConfig} behaviorsSetting={globalBehaviors} behaviorRecords={globalBehaviorRecords} setBehaviorRecords={setGlobalBehaviorRecords} user={user} exemptions={globalExemptions} />;
                    case 'exempt':
                        return <ExemptView students={globalStudents} exemptions={globalExemptions} setExemptions={setGlobalExemptions} user={user} isSyncing={isSyncing} />;
                    case 'behavior':
                        return <BehaviorView students={globalStudents} behaviorsSetting={globalBehaviors} records={globalBehaviorRecords} setRecords={setGlobalBehaviorRecords} user={user} isSyncing={isSyncing} />;
                    case 'check_behavior':
                        return <CheckBehaviorView students={globalStudents} behaviorRecords={globalBehaviorRecords} schoolConfig={schoolConfig} />;
                    case 'activity':
                        return <ActivityView students={globalStudents} activitiesSetting={schoolConfig.activities || [{id:1, name:'กิจกรรมเข้าแถวหน้าเสาธง'}]} records={globalActivityRecords} setRecords={setGlobalActivityRecords} user={user} isSyncing={isSyncing} />;
                    case 'schedule':
                        return <ScheduleManager teachers={globalTeachers} />;
                    case 'club_manage':
                        return <ClubManagerView teachers={globalTeachers} user={user} isSyncing={isSyncing} />;
                    case 'register':
                        return <RegisterView user={user} students={globalStudents} teachers={globalTeachers} records={globalRegistrations} setRecords={setGlobalRegistrations} isSyncing={isSyncing} />;
                    case 'attendance':
                        return <AttendanceView user={user} students={globalStudents} leaveRecords={globalLeaveRecords} setLeaveRecords={setGlobalLeaveRecords} periodSettings={globalPeriodSettings} behaviorsSetting={globalBehaviors} behaviorRecords={globalBehaviorRecords} setBehaviorRecords={setGlobalBehaviorRecords} registrations={globalRegistrations} allSchedules={globalSchedules} teachers={globalTeachers} />;
                    case 'leave':
                        return <LeaveView students={globalStudents} teachers={globalTeachers} user={user} records={globalLeaveRecords} setRecords={setGlobalLeaveRecords} isSyncing={isSyncing} />;
                    case 'history':
                        return <HistoryView students={globalStudents} timeRecords={globalTimeRecords} behaviorRecords={globalBehaviorRecords} activityRecords={globalActivityRecords} isSyncing={isSyncing} schoolConfig={schoolConfig} user={user} />;
                    case 'students':
                        return <StudentManager students={globalStudents} setStudents={setGlobalStudents} provincesData={globalProvinces} isSyncing={isSyncing} onRefresh={syncGlobalData} />;
                    case 'teachers':
                        return <TeacherManager teachers={globalTeachers} setTeachers={setGlobalTeachers} isSyncing={isSyncing} onRefresh={syncGlobalData} />;
                    case 'users':
                        return <UserManager users={globalUsers} setUsers={setGlobalUsers} isSyncing={isSyncing} onRefresh={syncGlobalData} />;
                    case 'reports':
                        return <ReportsView 
                            students={globalStudents} 
                            timeRecords={globalTimeRecords} 
                            behaviorRecords={globalBehaviorRecords} 
                            activityRecords={globalActivityRecords} 
                            activitiesSetting={schoolConfig.activities || []} 
                            schoolConfig={schoolConfig} 
                            teachers={globalTeachers}
                            leaveRecords={globalLeaveRecords}
                            user={user}
                            registrations={globalRegistrations}
                            allSchedules={globalSchedules}
                        />;
                    case 'settings':
                        return <SettingsView schoolConfig={schoolConfig} setSchoolConfig={setSchoolConfig} allMenus={allMenus} rolePermissions={rolePermissions} setRolePermissions={setRolePermissions} timeSettings={timeSettings} setTimeSettings={setTimeSettings} behaviors={globalBehaviors} setBehaviors={setGlobalBehaviors} periodSettings={globalPeriodSettings} setPeriodSettings={setGlobalPeriodSettings} lineNotifySettings={globalLineNotifySettings} setLineNotifySettings={setGlobalLineNotifySettings} />;
                    default:
                        // --- หน้าแรก Dashboard แบบใหม่ที่มีเมนูด่วน ---
                        const userRole = user.role || 'user';
                        const quickKey = `quick_${userRole}`;
                        
                        // กำหนดเมนูเริ่มต้น หากยังไม่มีการตั้งค่า
                        const defaultQuick = ['attendance', 'leave', 'behavior', 'reports'];
                        let myQuickIds = rolePermissions[quickKey] || defaultQuick;

                        // กรองเอาเฉพาะเมนูที่ผู้ใช้มีสิทธิ์เข้าถึง (ป้องกันการกดเข้าเมนูที่ไม่มีสิทธิ์)
                        const myAllowedMenus = rolePermissions[userRole] || [];
                        myQuickIds = myQuickIds.filter(id => myAllowedMenus.includes(id));

                        // แปลง ID เป็นออบเจกต์เมนูสำหรับแสดงผล
                        const myQuickMenus = myQuickIds.map(id => allMenus.find(m => m.id === id)).filter(Boolean);

                        return (
                            <div className="space-y-6 animate-[fadeIn_0.3s_ease-out]">
                                <div className="bg-white p-8 rounded-xl shadow-sm text-center border-t-4 border-ns-yellow mb-6">
                                    {schoolConfig.logo ? (
                                        <img src={schoolConfig.logo} alt="โลโก้โรงเรียน" className="mx-auto mb-4 h-28 md:h-32 object-contain drop-shadow-sm" onError={(e)=>{e.target.onerror = null; e.target.src="https://via.placeholder.com/150?text=Logo"}}/>
                                    ) : (
                                        <div className="w-24 h-24 bg-ns-yellow rounded-full mx-auto flex items-center justify-center mb-4 shadow-md">
                                            <i className="fa-solid fa-graduation-cap text-4xl text-ns-blue"></i>
                                        </div>
                                    )}
                                    <h2 className="text-2xl md:text-3xl font-bold text-ns-blue mb-2">ยินดีต้อนรับสู่ระบบ NS Student Care (NSC) {schoolConfig.name || 'NS Student Care (NSC)'}</h2>
                                    <p className="text-gray-600 mb-4">สวัสดีคุณ <span className="font-bold">{user.name}</span> ({user.role === 'admin' ? 'ผู้ดูแลระบบ' : user.role === 'executive' ? 'ผู้บริหาร' : user.role === 'dept_admin' ? 'แอดมินกลุ่มสาระ' : 'ผู้ใช้ทั่วไป'})</p>
                                    <button 
                                        onClick={() => { setChangePwdData({ newUsername: user.username || '', newPassword: '' }); setShowChangePwdModal(true); }} 
                                        className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold transition shadow-sm inline-flex items-center"
                                    >
                                        <i className="fa-solid fa-user-lock mr-2"></i> เปลี่ยนชื่อผู้ใช้ / รหัสผ่าน
                                    </button>
                                </div>

                                {/* Modal เปลี่ยนชื่อผู้ใช้และรหัสผ่าน */}
                                {showChangePwdModal && (
                                    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm text-left">
                                        <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm animate-[fadeIn_0.3s_ease-out]">
                                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                                <h3 className="text-lg font-bold text-ns-blue"><i className="fa-solid fa-user-lock mr-2"></i>เปลี่ยนชื่อผู้ใช้ / รหัสผ่าน</h3>
                                                <button onClick={() => setShowChangePwdModal(false)} className="text-gray-400 hover:text-red-500"><i className="fa-solid fa-times text-xl"></i></button>
                                            </div>
                                            <form onSubmit={handleChangePassword} className="space-y-4">
                                                <div>
                                                    <label className="block text-sm text-gray-600 mb-1">ชื่อผู้ใช้ (Username) ใหม่</label>
                                                    <input type="text" required value={changePwdData.newUsername} onChange={e=>setChangePwdData({...changePwdData, newUsername: e.target.value})} className="w-full border rounded p-2 focus:ring-2 focus:ring-ns-blue outline-none bg-blue-50" placeholder="New Username" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm text-gray-600 mb-1">รหัสผ่าน (Password) ใหม่</label>
                                                    <input type="text" required value={changePwdData.newPassword} onChange={e=>setChangePwdData({...changePwdData, newPassword: e.target.value})} className="w-full border rounded p-2 focus:ring-2 focus:ring-ns-blue outline-none bg-blue-50" placeholder="New Password" />
                                                </div>
                                                <div className="text-xs text-red-500 mb-2">* ระบบจะให้คุณล็อกอินใหม่หลังจากเปลี่ยนข้อมูลสำเร็จ</div>
                                                <button type="submit" disabled={isChangingPwd} className="w-full bg-ns-blue text-white py-2 rounded-lg hover:bg-blue-800 transition font-bold mt-2 shadow">
                                                    {isChangingPwd ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-save mr-2"></i>}
                                                    {isChangingPwd ? "กำลังบันทึก..." : "ยืนยันการเปลี่ยน"}
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                {myQuickMenus.length > 0 && (
                                    <div>
                                        <h3 className="font-bold text-gray-800 mb-4 border-l-4 border-ns-blue pl-3 text-lg"><i className="fa-solid fa-table-cells-large text-ns-blue mr-2"></i>เมนูด่วน (Dashboard)</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                            {myQuickMenus.map((m) => (
                                                <button 
                                                    key={m.id}
                                                    onClick={() => setCurrentView(m.id)}
                                                    className="bg-white p-6 rounded-xl shadow-sm border-2 border-gray-100 hover:border-ns-blue hover:shadow-md transition-all flex flex-col items-center justify-center group"
                                                >
                                                    <div className="w-16 h-16 bg-blue-50 text-ns-blue rounded-full flex items-center justify-center text-3xl mb-4 group-hover:bg-ns-blue group-hover:text-white transition-colors shadow-sm">
                                                        <i className={`fa-solid ${m.icon}`}></i>
                                                    </div>
                                                    <span className="font-bold text-gray-700 group-hover:text-ns-blue text-sm text-center">{m.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-ns-light">
                    {/* Sidebar */}
                    <div className={`${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:relative z-20 w-64 h-full bg-ns-blue text-white transition-transform duration-300 ease-in-out shadow-xl flex flex-col`}>
                        <div className="p-4 flex items-center justify-between border-b border-blue-800">
                            <h2 className="font-bold text-lg text-ns-yellow truncate pr-2">
                                {schoolConfig.logo ? <img src={schoolConfig.logo} className="inline-block w-8 h-8 mr-2 object-contain" alt="logo" /> : <i className="fa-solid fa-graduation-cap mr-2"></i>} 
                                {schoolConfig.name || 'NS Student Care (NSC)'}
                            </h2>
                            <button className="md:hidden text-white" onClick={() => setSidebarOpen(false)}>
                                <i className="fa-solid fa-times text-xl"></i>
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto py-4 hide-scrollbar">
                            <ul className="space-y-1">
                                {menus.map(m => (
                                    <li key={m.id}>
                                        <button onClick={() => { setCurrentView(m.id); setSidebarOpen(false); }}
                                            className={`w-full text-left px-6 py-3 hover:bg-blue-800 transition ${currentView === m.id ? 'bg-blue-800 border-l-4 border-ns-yellow' : ''}`}>
                                            <i className={`fa-solid ${m.icon} w-6 text-center mr-2 ${currentView === m.id ? 'text-ns-yellow' : ''}`}></i> {m.label}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="p-4 border-t border-blue-800 bg-blue-900">
                            <div className="text-sm truncate"><i className="fa-solid fa-user-circle mr-2 text-ns-yellow"></i> {user.name}</div>
                            <button onClick={() => setUser(null)} className="mt-2 w-full text-left text-sm text-red-300 hover:text-red-100">
                                <i className="fa-solid fa-sign-out-alt mr-2"></i> ออกจากระบบ
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden relative">
                        {/* Mobile Header */}
                        <div className="md:hidden bg-ns-blue text-white p-4 flex items-center justify-between shadow-md">
                            <button onClick={() => setSidebarOpen(true)}><i className="fa-solid fa-bars text-xl"></i></button>
                            <h1 className="font-bold text-ns-yellow truncate px-4 flex items-center">
                                {schoolConfig.name || 'NS Student Care (NSC)'}
                                {isSyncing && <i className="fa-solid fa-sync fa-spin ml-2 text-sm" title="กำลังซิงค์"></i>}
                            </h1>
                            <div className="w-6"></div> {/* Spacer */}
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-6xl mx-auto">
                                <div className="flex justify-between items-center mb-6 border-l-4 border-ns-yellow pl-4">
                                    <h1 className="text-2xl font-bold text-gray-800">
                                        {(menus.find(m => m.id === currentView) || {}).label || 'หน้าแรก'}
                                    </h1>
                                    <div className="hidden md:block">
                                        {isSyncing ? (
                                            <span className="text-sm text-gray-500 animate-pulse"><i className="fa-solid fa-sync fa-spin mr-2"></i>กำลังซิงค์ข้อมูลกับฐานข้อมูล...</span>
                                        ) : (
                                            <button onClick={syncGlobalData} className="text-sm text-gray-400 hover:text-ns-blue transition"><i className="fa-solid fa-rotate-right mr-1"></i>อัปเดตข้อมูล</button>
                                        )}
                                    </div>
                                </div>
                                {renderContent()}
                            </div>
                        </div>
                    </div>

                    {/* Overlays */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/50 z-10 md:hidden" onClick={() => setSidebarOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
